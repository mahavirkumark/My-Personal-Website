    <script>
    // 1. Apply theme before page renders
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();

    // 2. Listen for theme changes in other open tabs
    window.addEventListener('storage', (event) => {
        if (event.key === 'theme') {
            document.documentElement.setAttribute('data-theme', event.newValue);
        }
    });
</script>

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }

        body {

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle { cursor: pointer; font-size: 1.2rem; color: var(--text-muted); }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .stat-box i { font-size: 1.2rem; color: var(--primary); padding: 10px; background: rgba(244, 63, 94, 0.1); border-radius: 12px; }

        /* --- Main Layout Fix --- */
        .main-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 25px;
            align-items: start; /* Fix: Prevents the sidebar from stretching the whole height */

        @media (max-width: 900px) { 
            .main-layout { grid-template-columns: 1fr; } 
            .stats-row { grid-template-columns: 1fr; }
            .form-card { position: relative !important; top: 0 !important; }
        }

        .form-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            /* Sticky fix */
            position: -webkit-sticky;
            position: sticky;
            top: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .form-card h3 { margin: 0 0 15px 0; display: flex; align-items: center; gap: 10px; }

        .input-field { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
        
        input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input:focus { outline: 2px solid var(--secondary); border-color: transparent; }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-save:hover { background: var(--primary-hover); }

        .anni-list { display: flex; flex-direction: column; gap: 15px; }

        .item-card {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .names { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
        .meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 12px; align-items: center; }
        
        .years-badge {
            background: var(--secondary);
            color: white;
            padding: 3px 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .actions { display: flex; gap: 8px; }
        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text-muted);
        }

        .action-btn:hover { background: var(--secondary); color: white; }
        .delete-btn:hover { background: var(--primary); }

<body>

<div class="container">
    <div class="top-bar">
        <div>
            <h2 style="margin:0">Eternal Moments</h2>
            <p style="color:var(--text-muted); margin:0;">Beautifully tracking your milestones</p>
        </div>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <i class="fa-solid fa-cake-candles"></i>
            <div>
                <label>Today's Anniversary</label>
                <div id="todayVal" style="font-weight:700">None</div>
            </div>
        </div>
        <div class="stat-box">
            <i class="fa-solid fa-calendar-days"></i>
            <div>
                <label>Next Up</label>
                <div id="upcomingVal" style="font-weight:700">None</div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="form-card">
            <h3><i class="fa-solid fa-pen-nib"></i> Add Record</h3>
            <input type="hidden" id="editIdx" value="-1">
            
            <div class="input-field">
                <label>Husband's Name</label>
                <input type="text" id="hName" placeholder="e.g. Michael">
            </div>

            <div class="input-field">
                <label>Wife's Name</label>
                <input type="text" id="wName" placeholder="e.g. Sarah">
            </div>

            <div class="input-field">
                <label>Anniversary Date</label>
                <input type="date" id="anniDate">
            </div>

            <div class="input-field">
                <label>Years Completed (Optional)</label>
                <input type="number" id="manualYears" placeholder="Enter only if you want to show it">
            </div>

            <button class="btn-save" onclick="handleSave()">Save Anniversary</button>
        </div>

        <div class="anni-list" id="list">
            </div>
    </div>
</div>
<script>
    // --- 1. FIREBASE CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
    authDomain: "sk12-58e9e.firebaseapp.com",
    databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com",
    projectId: "sk12-58e9e",
    storageBucket: "sk12-58e9e.appspot.com",
    messagingSenderId: "147194239940",
    appId: "1:147194239940:web:c66474c95c7e2dd8dffada"
};

// Initialize
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let storage = {};
let userAnniRef = null;

// --- 2. AUTH & REAL-TIME SYNC ---
firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        // Point to the private user folder: anniversaries/UID
        userAnniRef = db.ref('anniversaries/' + user.uid);
        
        // Listen for changes
        userAnniRef.on('value', (snapshot) => {
            storage = snapshot.val() || {};
            render();
        });
    } else {
        console.warn("User not authenticated. Please log in.");
        // Optional: window.location.href = 'login.html';
    }
});

// --- 3. CORE FUNCTIONS ---

function handleSave() {
    if (!userAnniRef) return alert("Please log in to save data.");

    const h = document.getElementById('hName').value;
    const w = document.getElementById('wName').value;
    const d = document.getElementById('anniDate').value;
    const y = document.getElementById('manualYears').value;
    const idx = document.getElementById('editIdx').value;

    if (!h || !w || !d) return alert("Please fill the main fields.");

    const data = { h, w, d, manualYears: y };

    if (idx === "-1") {
        userAnniRef.push(data);
    } else {
        // Correct path for updating: anniversaries/UID/KEY
        userAnniRef.child(idx).set(data);
    }

    resetForm();
}

function render() {
    const list = document.getElementById('list');
    const todayEl = document.getElementById('todayVal');
    const upcomingEl = document.getElementById('upcomingVal');
    list.innerHTML = '';
    let todays = [];
    let upcoming = [];

    Object.keys(storage).forEach((key) => {
        const item = storage[key];
        const dateObj = new Date(item.d);
        const today = new Date();
        
        // Years calculation
        let displayYears = "";
        if (item.manualYears && item.manualYears !== "") {
            let baseYears = today.getFullYear() - dateObj.getFullYear();
            const m = today.getMonth() - dateObj.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dateObj.getDate())) baseYears--;
            displayYears = parseInt(item.manualYears) + baseYears;
        }

        const isToday = today.getDate() === dateObj.getDate() && 
                        today.getMonth() === dateObj.getMonth();
        
        if (isToday) todays.push(`${item.h} & ${item.w}`);

        const card = document.createElement('div');
        card.className = 'item-card animate-pop';
        card.innerHTML = `
            <div>
                <div class="names">${item.h} <i class="fa-solid fa-heart" style="color:var(--primary)"></i> ${item.w}</div>
                <div class="meta">
                    <span><i class="fa-regular fa-calendar"></i> ${item.d}</span>
                    ${item.manualYears ? `<span class="years-badge">${displayYears} Years</span>` : ''}
                </div>
            </div>
            <div class="actions">
                <button class="action-btn" onclick="editItem('${key}')"><i class="fa-solid fa-pencil"></i></button>
                <button class="action-btn delete-btn" onclick="deleteItem('${key}')"><i class="fa-solid fa-trash"></i></button>
            </div>
        `;
        list.appendChild(card);
    });

    todayEl.innerText = todays.length ? todays.join(', ') : "None today";
}

function editItem(key) {
    const item = storage[key];
    document.getElementById('hName').value = item.h;
    document.getElementById('wName').value = item.w;
    document.getElementById('anniDate').value = item.d;
    document.getElementById('manualYears').value = item.manualYears;
    document.getElementById('editIdx').value = key;
}

function deleteItem(key) {
    if (confirm("Remove this anniversary?") && userAnniRef) {
        userAnniRef.child(key).remove();
    }
}

function resetForm() {
    document.getElementById('hName').value = '';
    document.getElementById('wName').value = '';
    document.getElementById('anniDate').value = '';
    document.getElementById('manualYears').value = '';
    document.getElementById('editIdx').value = '-1';
}

function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('themeIcon');
    if (body.getAttribute('data-theme') === 'dark') {
        body.removeAttribute('data-theme');
        icon.className = 'fa-solid fa-moon';
    } else {
        body.setAttribute('data-theme', 'dark');
        icon.className = 'fa-solid fa-sun';
    }
}
</script>

        background: var(--bg);
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .action-btn:hover { background: var(--secondary); color: white; }
    .delete-btn:hover { background: var(--primary); }

    /* 6. BOTTOM NAVIGATION */
    #universal-bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 65px;
        background-color: var(--nav-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-top: 1px solid var(--border);
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
        z-index: 9999;
        padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-link {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: var(--nav-text) !important;
        opacity: 0.6;
    }

    .nav-link i { font-size: 20px; margin-bottom: 4px; }
    .nav-link div { font-size: 10px; font-weight: 700; text-transform: uppercase; }

    .nav-link:hover, .nav-link.active {
        opacity: 1;
        color: var(--active-color) !important;
    }

    /* 7. ANIMATIONS */
    @keyframes popIn {
        0% { transform: scale(0.9); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 900px) { 
        .main-layout { grid-template-columns: 1fr; } 
        .stats-row { grid-template-columns: 1fr; }
        .form-card { position: relative; top: 0; }
    }
</style>
</style>
