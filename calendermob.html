<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Savig · Calendar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a2332;
  --text-light: #6b7a8f;
  --border: #dce3ec;
  --primary: #4f46e5;
  --primary-light: #eef2ff;
  --green: #059669;
  --red: #dc2626;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 14px;
  --today-border: #4f46e5;
}

[data-theme="dark"] {
  --bg: #0f1a2e;
  --card: #1a2a40;
  --text: #eef2f6;
  --text-light: #9aa9b9;
  --border: #2d4055;
  --primary: #818cf8;
  --primary-light: #1a2a40;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --today-border: #818cf8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  padding-bottom: 80px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SEARCH MODE - Full Screen ===== */
body.search-mode {
  overflow: hidden;
}

body.search-mode .header,
body.search-mode .weekdays,
body.search-mode #calendar,
body.search-mode .bottom-nav,
body.search-mode .search-wrap .actions {
  display: none !important;
}

body.search-mode .search-wrap {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--bg);
  padding: 16px 16px 12px 16px;
  max-width: 100%;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

body.search-mode .search-wrap input {
  font-size: 1.1rem;
  padding: 14px 18px;
  flex: 1;
}

body.search-mode .search-wrap .search-back {
  display: flex !important;
}

body.search-mode #searchResults {
  position: fixed;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 999;
  background: var(--bg);
  padding: 12px 16px;
  overflow-y: auto;
  max-width: 100%;
}

/* Search Back Button */
.search-back {
  display: none !important;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text);
  font-size: 1.2rem;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}

.search-back:hover {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: scale(1.05);
}

.search-back:active {
  transform: scale(0.92);
}

.search-wrap .search-back.show {
  display: flex !important;
}

/* ===== CALENDAR GRID ===== */
#calendar {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 12px 20px 12px;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

@media (min-width: 640px) {
  #calendar {
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    padding: 0 8px 20px 8px;
    max-width: 1000px;
  }
}

@media (max-width: 380px) {
  #calendar {
    gap: 6px;
    padding: 0 6px 16px 6px;
  }
}

/* ===== CALENDAR CELL ===== */
.cell {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 8px 8px 8px;
  min-height: 100px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.3s;
  display: flex;
  flex-direction: column;
  width: 100%;
  overflow: hidden;
}

.cell:active {
  transform: scale(0.97);
}

@media (min-width: 640px) {
  .cell {
    min-height: 120px;
    padding: 12px 10px 10px 10px;
  }
  .cell:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
}

.cell.today {
  border-color: var(--today-border);
  border-width: 3px;
  background: var(--primary-light);
}

.cell.sunday {
  background: #fef2f2;
  border-color: #fca5a5;
}

[data-theme="dark"] .cell.sunday {
  background: #2d1b24;
  border-color: #f87171;
}

.cell .day {
  font-weight: 700;
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

@media (max-width: 380px) {
  .cell .day {
    font-size: 0.85rem;
  }
}

.cell .day .weekday {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-light);
}

.cell .tasks {
  margin-top: 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  overflow: hidden;
}

.cell .tasks .pill {
  font-size: 0.85rem;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--primary-light);
  color: var(--text);
  border-left: 3px solid var(--primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
  width: 100%;
}

@media (max-width: 380px) {
  .cell .tasks .pill {
    font-size: 0.85rem;
    padding: 1px 6px;
  }
}

.cell .tasks .pill.event {
  background: #d1fae5;
  border-left-color: var(--green);
}

[data-theme="dark"] .cell .tasks .pill {
  background: #2d4055;
  border-left-color: var(--primary);
}

[data-theme="dark"] .cell .tasks .pill.event {
  background: #1a3a3a;
  border-left-color: #34d399;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 12px 8px 12px;
  max-width: 800px;
  margin: 0 auto;
  flex-wrap: wrap;
  gap: 8px;
}

@media (min-width: 640px) {
  .header {
    max-width: 1000px;
    padding: 16px 12px 12px 12px;
  }
}

.header h2 {
  font-size: 1.2rem;
  font-weight: 800;
  text-align: center;
  flex: 1;
  min-width: 120px;
}

@media (min-width: 640px) {
  .header h2 {
    font-size: 1.5rem;
  }
}

/* ===== WEEKDAY HEADER ===== */
.weekdays {
  display: none;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-light);
  padding: 4px 8px 8px 8px;
  max-width: 1000px;
  margin: 0 auto;
}

@media (min-width: 640px) {
  .weekdays {
    display: grid;
  }
}

/* ===== BUTTONS ===== */
.btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 40px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  box-shadow: var(--shadow);
  white-space: nowrap;
}

.btn:active {
  transform: scale(0.95);
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  border: none;
}

.btn-green {
  background: var(--green);
  color: #fff;
  border: none;
}

.btn-red {
  background: var(--red);
  color: #fff;
  border: none;
}

/* ===== SEARCH BAR ===== */
.search-wrap {
  padding: 0 12px 10px 12px;
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  width: 100%;
}

@media (min-width: 640px) {
  .search-wrap {
    max-width: 1000px;
    padding: 0 12px 12px 12px;
    flex-wrap: nowrap;
  }
}

.search-wrap input {
  flex: 1;
  min-width: 100px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 40px;
  background: var(--card);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border 0.2s;
  width: 100%;
}

.search-wrap input:focus {
  border-color: var(--primary);
}

.search-wrap .actions {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

@media (max-width: 480px) {
  .search-wrap .actions .btn {
    font-size: 0.6rem;
    padding: 4px 10px;
  }
  .search-wrap input {
    font-size: 0.8rem;
    padding: 8px 12px;
  }
}

/* ===== SEARCH RESULTS ===== */
#searchResults {
  padding: 0 12px 12px 12px;
  max-width: 800px;
  margin: 0 auto;
}

@media (min-width: 640px) {
  #searchResults {
    max-width: 1000px;
  }
}

#searchResults .result {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: 0.15s;
}

#searchResults .result:active {
  transform: scale(0.98);
}

#searchResults .result .title {
  font-weight: 600;
  font-size: 0.9rem;
}

#searchResults .result .meta {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 2px;
}

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 16px;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: var(--card);
  border-radius: 24px;
  max-width: 500px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 24px 48px rgba(0,0,0,0.2);
}

@media (max-width: 480px) {
  .modal {
    padding: 16px;
    border-radius: 18px;
  }
}

.modal .modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.modal .modal-header h3 {
  font-size: 1.1rem;
  font-weight: 700;
}

.modal .modal-header .close {
  background: none;
  border: none;
  font-size: 1.8rem;
  color: var(--red);
  cursor: pointer;
  padding: 0 8px;
}

.modal input, .modal textarea, .modal select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
  margin-bottom: 8px;
  outline: none;
}

.modal input:focus, .modal textarea:focus {
  border-color: var(--primary);
}

.modal textarea {
  resize: vertical;
  min-height: 60px;
}

.modal .row {
  display: flex;
  gap: 8px;
}

.modal .row > * {
  flex: 1;
}

.modal .task-list {
  background: var(--bg);
  border-radius: 12px;
  padding: 12px;
  max-height: 200px;
  overflow-y: auto;
  margin-top: 8px;
}

.modal .task-item {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 8px 10px;
  margin-bottom: 4px;
  border-radius: 10px;
  background: var(--card);
  border-left: 4px solid var(--primary);
  font-size: 0.85rem;
  gap: 8px;
}

.modal .task-item.event-item {
  border-left-color: var(--green);
}

.modal .task-item .info {
  flex: 1;
  min-width: 0;
}

.modal .task-item .info .title {
  font-weight: 600;
  word-break: break-word;
}

.modal .task-item .info .desc {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 2px;
  word-break: break-word;
}

.modal .task-item .actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

.modal .task-item .actions button {
  padding: 2px 10px;
  border: none;
  border-radius: 20px;
  font-size: 0.6rem;
  font-weight: 600;
  cursor: pointer;
}

.modal .task-item .actions .edit {
  background: var(--primary);
  color: #fff;
}

.modal .task-item .actions .delete {
  background: var(--red);
  color: #fff;
}

.modal .task-item .actions .done {
  background: var(--green);
  color: #fff;
}

/* ===== BOTTOM NAVIGATION ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 72px;
  z-index: 100;
  backdrop-filter: blur(12px);
  padding: 0 4px;
}

@media (max-width: 480px) {
  .bottom-nav {
    height: 60px;
  }
}

/* ===== NAV LINKS - LIGHT MODE (Black icons & text, font-weight 700) ===== */
.bottom-nav a {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 0.8rem;
  font-weight: 700;
  color: #000000;
  text-decoration: none;
  padding: 4px 8px;
  border-radius: 12px;
  transition: all 0.3s ease;
  gap: 1px;
  position: relative;
}

.bottom-nav a i {
  font-size: 1.4rem;
  color: #000000;
  transition: all 0.3s ease;
  font-weight: 700;
}

.bottom-nav a span {
  font-weight: 700;
}

@media (max-width: 480px) {
  .bottom-nav a i {
    font-size: 1.2rem;
  }
  .bottom-nav a {
    font-size: 0.8rem;
  }
}

/* ===== CLICK/HOVER EFFECT - BLUE & LIFT ===== */
.bottom-nav a:hover,
.bottom-nav a:focus,
.bottom-nav a:active {
  color: #4f46e5 !important;
  transform: translateY(-4px);
}

.bottom-nav a:hover i,
.bottom-nav a:focus i,
.bottom-nav a:active i {
  color: #4f46e5 !important;
  transform: translateY(-4px);
}

/* ===== DARK MODE - White icons & text, font-weight 700 ===== */
[data-theme="dark"] .bottom-nav {
  background: #0f1a2e;
  border-top-color: #1e2a3a;
}

[data-theme="dark"] .bottom-nav a {
  color: #ffffff;
  font-weight: 700;
}

[data-theme="dark"] .bottom-nav a i {
  color: #ffffff;
  font-weight: 700;
}

[data-theme="dark"] .bottom-nav a span {
  font-weight: 700;
}

/* ===== DARK MODE - HOVER EFFECT ===== */
[data-theme="dark"] .bottom-nav a:hover,
[data-theme="dark"] .bottom-nav a:focus,
[data-theme="dark"] .bottom-nav a:active {
  color: #818cf8 !important;
  transform: translateY(-4px);
}

[data-theme="dark"] .bottom-nav a:hover i,
[data-theme="dark"] .bottom-nav a:focus i,
[data-theme="dark"] .bottom-nav a:active i {
  color: #818cf8 !important;
  transform: translateY(-4px);
}

/* ===== REMOVE ACTIVE INDICATOR ===== */
.bottom-nav a.active::before {
  display: none !important;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  color: var(--text-light);
  padding: 20px;
  font-style: italic;
  font-size: 0.85rem;
}

/* ===== FOCUS MODE ===== */
body.focus-mode .bottom-nav,
body.focus-mode .search-wrap,
body.focus-mode .header,
body.focus-mode .weekdays,
body.focus-mode #calendar {
  display: none !important;
}

body.focus-mode .modal-overlay#taskModal {
  display: flex !important;
  background: var(--bg) !important;
  padding: 0 !important;
}

body.focus-mode .modal-overlay#taskModal .modal {
  border-radius: 0 !important;
  max-width: 100% !important;
  height: 100vh !important;
  max-height: 100vh !important;
  background: var(--bg) !important;
  border: none !important;
  padding: 16px !important;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <button class="btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i> Prev</button>
  <h2 id="monthYear">January 2024</h2>
  <button class="btn" onclick="changeMonth(1)">Next <i class="fas fa-chevron-right"></i></button>
</div>

<!-- ===== SEARCH ===== -->
<div class="search-wrap">
  <button class="search-back" id="searchBackBtn" onclick="exitSearchMode()" aria-label="Go back">
    <i class="fas fa-arrow-left"></i>
  </button>
  <input type="text" id="searchInput" placeholder="🔍 Search tasks & events...">
  <div class="actions">
    <select id="searchTimeframe" class="btn" style="appearance:auto;padding:6px 12px;">
      <option value="1year">1 Year</option>
      <option value="alltime">All time</option>
    </select>
    <button class="btn btn-green" id="downloadPDF"><i class="fas fa-download"></i> PDF</button>
    <button class="btn btn-primary" id="openEventBtn"><i class="fas fa-plus"></i> Event</button>
    <button class="btn btn-green" onclick="openTracking('completed')"><i class="fas fa-check-circle"></i> Done</button>
    <button class="btn btn-red" onclick="openTracking('incomplete')"><i class="fas fa-times-circle"></i> Pending</button>
  </div>
</div>

<!-- ===== SEARCH RESULTS ===== -->
<div id="searchResults"></div>

<!-- ===== WEEKDAYS ===== -->
<div class="weekdays">
  <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span>
  <span>Fri</span><span class="text-red-500">Sat</span><span class="text-red-500">Sun</span>
</div>

<!-- ===== CALENDAR ===== -->
<div id="calendar"></div>

<!-- ===== TASK MODAL ===== -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Tasks for date</h3>
      <button class="close" id="closeTaskModal">&times;</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr;gap:8px;">
      <div>
        <input type="text" id="taskTitle" placeholder="Task title">
        <textarea id="taskDesc" placeholder="Details (optional)"></textarea>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" style="flex:1;justify-content:center;" id="saveTask">Save</button>
          <button class="btn" style="flex:1;justify-content:center;" id="cancelTask">Cancel</button>
        </div>
      </div>
      <div>
        <div class="task-list" id="taskList">
          <div class="empty-state">No tasks or events</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== EVENT MODAL ===== -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="eventModalTitle">Add Event</h3>
      <button class="close" id="closeEventModal">&times;</button>
    </div>
    <input type="text" id="eventTitle" placeholder="Event name *">
    <div class="row">
      <input type="date" id="eventDate">
      <input type="time" id="eventTime" value="09:00">
    </div>
    <input type="text" id="eventLocation" placeholder="Location (optional)">
    <textarea id="eventDesc" placeholder="Details (optional)"></textarea>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-primary" style="flex:1;justify-content:center;" id="saveEvent"><i class="fas fa-bell"></i> Save</button>
      <button class="btn" style="flex:1;justify-content:center;" id="cancelEvent">Cancel</button>
    </div>
  </div>
</div>

<!-- ===== STATUS PROMPT ===== -->
<div class="modal-overlay" id="statusModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3>Update Status</h3>
      <button class="close" id="closeStatusModal">&times;</button>
    </div>
    <p style="margin-bottom:12px;">Did you complete <strong id="statusEventTitle" style="color:var(--primary);">event</strong>?</p>
    <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:12px;">Date: <span id="statusDate"></span> · Time: <span id="statusTime"></span></p>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      <button class="btn btn-green" style="flex:1;justify-content:center;" id="statusDone">✅ Done</button>
      <button class="btn btn-red" style="flex:1;justify-content:center;" id="statusNotDone">❌ Not done</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center;" id="statusReschedule"><i class="fas fa-calendar-alt"></i> Reschedule</button>
      <button class="btn" style="flex:1;justify-content:center;background:var(--red);color:#fff;border:none;" id="statusCancel"><i class="fas fa-trash"></i> Cancel</button>
    </div>
  </div>
</div>

<!-- ===== RESCHEDULE MODAL ===== -->

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
  authDomain: "sk12-58e9e.firebaseapp.com",
  databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com",
  projectId: "sk12-58e9e",
  storageBucket: "sk12-58e9e.firebasestorage.app",
  messagingSenderId: "470207874652",
  appId: "1:470207874652:web:67ba1cf3629b7e5b144899"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== STATE =====
let user = null;
let currentDate = new Date();
let selectedDate = null;
let editTaskId = null;
let editEventId = null;
let pendingEvents = [];
let currentEvent = null;
const STATUS = { PENDING: 'pending', COMPLETED: 'completed', INCOMPLETE: 'incomplete' };

// ===== THEME =====
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

// ===== HELPERS =====
function toISO(d) {
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

function capitalize(s) {
  if (!s) return '';
  return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}

function formatDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  return `${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}-${y}`;
}

// ===== AUTH =====
auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    renderCalendar();
    startChecks();
    checkPending();
  } else {
    window.location.href = 'index.html';
  }
});

// ===== RENDER CALENDAR =====
function renderCalendar() {
  if (!user) return;
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('monthYear').textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  const first = new Date(y, m, 1);
  let start = (first.getDay() + 6) % 7;
  const days = new Date(y, m+1, 0).getDate();
  const today = toISO(new Date());

  if (window.innerWidth >= 640) {
    for (let i = 0; i < start; i++) {
      const empty = document.createElement('div');
      empty.className = 'cell';
      empty.style.opacity = '0.2';
      empty.style.pointerEvents = 'none';
      cal.appendChild(empty);
    }
  }

  for (let d = 1; d <= days; d++) {
    const dt = new Date(Date.UTC(y, m, d));
    const iso = toISO(dt);
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (iso === today) cell.classList.add('today');
    if (dt.getUTCDay() === 0) cell.classList.add('sunday');

    const dayDiv = document.createElement('div');
    dayDiv.className = 'day';
    dayDiv.innerHTML = `<span>${d}</span><span class="weekday">${dt.toLocaleDateString('en', { weekday: 'short', timeZone: 'UTC' })}</span>`;
    cell.appendChild(dayDiv);

    const tasksDiv = document.createElement('div');
    tasksDiv.className = 'tasks';
    tasksDiv.id = `tasks-${iso}`;
    cell.appendChild(tasksDiv);

    cell.onclick = () => openTaskModal(iso);
    cal.appendChild(cell);
    loadCellTasks(iso);
  }
}

function loadCellTasks(iso) {
  const container = document.getElementById(`tasks-${iso}`);
  if (!container || !user) return;
  container.innerHTML = '';
  db.ref(`users/${user.uid}`).once('value').then(snap => {
    const data = snap.val() || {};
    const tasks = data.tasks?.[iso] || {};
    const events = data.events?.[iso] || {};
    const items = [];
    Object.values(tasks).forEach(t => items.push({ type: 'task', ...t }));
    Object.values(events).filter(e => e.status === STATUS.PENDING).forEach(e => items.push({ type: 'event', ...e }));
    items.sort((a, b) => a.type === 'event' ? -1 : 1);
    const maxItems = window.innerWidth < 640 ? 3 : 4;
    items.slice(0, maxItems).forEach(item => {
      const pill = document.createElement('div');
      pill.className = `pill${item.type === 'event' ? ' event' : ''}`;
      pill.textContent = `${item.type === 'event' ? '🔔 ' : '• '}${item.title}`;
      container.appendChild(pill);
    });
  });
}

function changeMonth(offset) {
  currentDate.setMonth(currentDate.getMonth() + offset);
  renderCalendar();
}

// ===== SEARCH MODE =====
function enterSearchMode() {
  document.body.classList.add('search-mode');
  document.getElementById('searchBackBtn').classList.add('show');
  document.getElementById('searchInput').focus();
}

function exitSearchMode() {
  document.body.classList.remove('search-mode');
  document.getElementById('searchBackBtn').classList.remove('show');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
}

// ===== TASK MODAL =====
function openTaskModal(iso) {
  selectedDate = iso;
  document.getElementById('modalTitle').textContent = `Tasks: ${formatDate(iso)}`;
  document.getElementById('taskModal').classList.add('show');
  document.body.classList.add('focus-mode');
  loadTasks(iso);
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('show');
  document.body.classList.remove('focus-mode');
  editTaskId = null;
}

document.getElementById('closeTaskModal').addEventListener('click', closeTaskModal);
document.getElementById('cancelTask').addEventListener('click', closeTaskModal);

function loadTasks(iso) {
  const list = document.getElementById('taskList');
  if (!user) return;
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  const taskRef = db.ref(`users/${user.uid}/tasks/${iso}`);
  const eventRef = db.ref(`users/${user.uid}/events/${iso}`);
  Promise.all([taskRef.once('value'), eventRef.once('value')]).then(([ts, es]) => {
    const tasks = ts.val() || {};
    const events = es.val() || {};
    const items = [];
    Object.entries(tasks).forEach(([id, t]) => items.push({ type: 'task', id, ...t }));
    Object.entries(events).filter(([id, e]) => e.status === STATUS.PENDING).forEach(([id, e]) => items.push({ type: 'event', id, ...e }));
    items.sort((a, b) => a.type === 'event' ? -1 : 1);
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<div class="empty-state">✨ All clear</div>';
      return;
    }
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = `task-item${item.type === 'event' ? ' event-item' : ''}`;
      div.innerHTML = `
        <div class="info">
          <div class="title">${item.type === 'event' ? '📅 ' : '📌 '}${item.title}</div>
          ${item.type === 'event' ? `<div style="font-size:0.7rem;color:var(--green);">🕒 ${item.time}</div>` : ''}
          ${item.desc ? `<div class="desc">${item.desc}</div>` : ''}
        </div>
        <div class="actions">
          <button class="edit" onclick="editItem('${item.type}','${item.id}','${iso}')">Edit</button>
          <button class="delete" onclick="deleteItem('${item.type}','${item.id}','${iso}')">Delete</button>
          ${item.type === 'event' ? `<button class="done" onclick="updateStatus({date:'${iso}',id:'${item.id}'},'${STATUS.COMPLETED}',true)">Done</button>` : ''}
        </div>
      `;
      list.appendChild(div);
    });
  });
}

// ===== SAVE TASK =====
document.getElementById('saveTask').addEventListener('click', function() {
  if (!user || !selectedDate) return;
  const title = capitalize(document.getElementById('taskTitle').value.trim());
  const desc = capitalize(document.getElementById('taskDesc').value.trim());
  if (!title) return alert('Enter a task title');
  const ref = db.ref(`users/${user.uid}/tasks/${selectedDate}`);
  const data = { title, desc };
  if (editTaskId) {
    ref.child(editTaskId).set(data).then(() => {
      editTaskId = null;
      loadTasks(selectedDate);
      renderCalendar();
    });
  } else {
    ref.push(data).then(() => {
      loadTasks(selectedDate);
      renderCalendar();
    });
  }
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
});

// ===== EDIT / DELETE =====
window.editItem = function(type, id, iso) {
  if (type === 'event') {
    db.ref(`users/${user.uid}/events/${iso}/${id}`).once('value').then(snap => {
      const ev = snap.val();
      if (!ev) return;
      editEventId = id;
      document.getElementById('eventTitle').value = ev.title || '';
      document.getElementById('eventDate').value = iso;
      document.getElementById('eventTime').value = ev.time || '09:00';
      document.getElementById('eventLocation').value = ev.location || '';
      document.getElementById('eventDesc').value = ev.desc || '';
      document.getElementById('eventModalTitle').textContent = 'Edit Event';
      document.getElementById('eventModal').classList.add('show');
    });
  } else {
    db.ref(`users/${user.uid}/tasks/${iso}/${id}`).once('value').then(snap => {
      const task = snap.val();
      if (!task) return;
      editTaskId = id;
      document.getElementById('taskTitle').value = task.title || '';
      document.getElementById('taskDesc').value = task.desc || '';
      document.getElementById('taskModal').classList.add('show');
      document.body.classList.add('focus-mode');
    });

};

window.deleteItem = function(type, id, iso) {
  if (!confirm(`Delete this ${type}?`)) return;
  const path = type === 'event' ? 'events' : 'tasks';
  db.ref(`users/${user.uid}/${path}/${iso}/${id}`).remove().then(() => {
    loadTasks(iso);
    renderCalendar();
  });
};

// ===== EVENT MODAL =====
document.getElementById('openEventBtn').addEventListener('click', () => {
  editEventId = null;
  document.getElementById('eventModalTitle').textContent = 'Add Event';
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDate').value = toISO(new Date());
  document.getElementById('eventTime').value = '09:00';
  document.getElementById('eventLocation').value = '';
  document.getElementById('eventDesc').value = '';
  document.getElementById('eventModal').classList.add('show');
});

document.getElementById('closeEventModal').addEventListener('click', () => {
  document.getElementById('eventModal').classList.remove('show');
  editEventId = null;
});
document.getElementById('cancelEvent').addEventListener('click', () => {
  document.getElementById('eventModal').classList.remove('show');
  editEventId = null;
});

document.getElementById('saveEvent').addEventListener('click', function() {
  if (!user) return;
  const title = capitalize(document.getElementById('eventTitle').value.trim());
  const date = document.getElementById('eventDate').value;
  const time = document.getElementById('eventTime').value;
  if (!title || !date || !time) return alert('Title, date & time required');
  const location = capitalize(document.getElementById('eventLocation').value.trim());
  const desc = capitalize(document.getElementById('eventDesc').value.trim());
  const data = {
    title, time, location, desc,
    timestamp: new Date(`${date}T${time}:00`).getTime(),
    savedTimestamp: Date.now(),
    status: STATUS.PENDING
  };
  const ref = db.ref(`users/${user.uid}/events/${date}`);
  if (editEventId) {
    ref.child(editEventId).set(data).then(() => {
      editEventId = null;
      document.getElementById('eventModal').classList.remove('show');
      renderCalendar();
      checkPending();
    });
  } else {
    ref.push(data).then(() => {
      document.getElementById('eventModal').classList.remove('show');
      renderCalendar();
      checkPending();
    });
  }
});

// ===== STATUS PROMPT =====
async function checkPending() {
  if (!user) return;
  const snap = await db.ref(`users/${user.uid}/events`).once('value');
  const all = snap.val() || {};
  pendingEvents = [];
  const today = new Date();
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  Object.entries(all).forEach(([iso, day]) => {
    Object.entries(day).forEach(([id, ev]) => {
      const [y, m, d] = iso.split('-').map(Number);
      const eventDay = new Date(y, m-1, d).getTime();
      if (ev.status === STATUS.PENDING && todayStart > eventDay) {
        pendingEvents.push({ date: iso, id, ...ev });
      }
    });
  });
  if (pendingEvents.length) showStatusPrompt();
}

function showStatusPrompt() {
  if (!pendingEvents.length) return;
  const ev = pendingEvents[0];
  currentEvent = ev;
  document.getElementById('statusEventTitle').textContent = ev.title;
  document.getElementById('statusDate').textContent = formatDate(ev.date);
  document.getElementById('statusTime').textContent = ev.time;
  document.getElementById('statusModal').classList.add('show');
}

document.getElementById('closeStatusModal').addEventListener('click', () => {
  document.getElementById('statusModal').classList.remove('show');
  if (pendingEvents.length) showStatusPrompt();
});

window.updateStatus = function(event, status, fromModal = false) {
  if (!user || !event.date || !event.id) return;
  db.ref(`users/${user.uid}/events/${event.date}/${event.id}`).update({ status }).then(() => {
    renderCalendar();
    if (fromModal && selectedDate === event.date) loadTasks(event.date);
    if (pendingEvents.length && pendingEvents[0]?.id === event.id) {
      pendingEvents.shift();
      document.getElementById('statusModal').classList.remove('show');
      if (pendingEvents.length) showStatusPrompt();
    }
    if (document.getElementById('trackingModal').classList.contains('show')) {
      const mode = document.getElementById('trackingTitle').textContent.includes('Completed') ? 'completed' : 'incomplete';
      loadTracking(mode);
    }
  });
};

document.getElementById('statusDone').addEventListener('click', () => {
  if (currentEvent) updateStatus(currentEvent, STATUS.COMPLETED, false);
});
document.getElementById('statusNotDone').addEventListener('click', () => {
  if (currentEvent) updateStatus(currentEvent, STATUS.INCOMPLETE, false);
});

// ===== RESCHEDULE =====
document.getElementById('statusReschedule').addEventListener('click', () => {
  if (!currentEvent) return;
  document.getElementById('rescheduleTitle').textContent = currentEvent.title;
  document.getElementById('rescheduleDate').value = currentEvent.date;
  document.getElementById('rescheduleTime').value = currentEvent.time;
  document.getElementById('statusModal').classList.remove('show');
  document.getElementById('rescheduleModal').classList.add('show');
});

document.getElementById('closeRescheduleModal').addEventListener('click', () => {
  document.getElementById('rescheduleModal').classList.remove('show');
  if (pendingEvents.length) showStatusPrompt();
});

document.getElementById('confirmReschedule').addEventListener('click', function() {
  if (!currentEvent) return alert('No event');
  const newDate = document.getElementById('rescheduleDate').value;
  const newTime = document.getElementById('rescheduleTime').value;
  if (!newDate || !newTime) return alert('Select date & time');
  const ev = currentEvent;
  db.ref(`users/${user.uid}/events/${ev.date}/${ev.id}`).update({
    date: newDate,
    time: newTime,
    timestamp: new Date(`${newDate}T${newTime}:00`).getTime()
  }).then(() => {
    const oldDate = ev.date;
    const refOld = db.ref(`users/${user.uid}/events/${oldDate}/${ev.id}`);
    refOld.once('value').then(snap => {
      const data = snap.val();
      if (data) {
        db.ref(`users/${user.uid}/events/${newDate}`).push(data).then(() => {
          refOld.remove().then(() => {
            document.getElementById('rescheduleModal').classList.remove('show');
            renderCalendar();
            if (selectedDate === oldDate || selectedDate === newDate) loadTasks(selectedDate);
            pendingEvents.shift();
            if (pendingEvents.length) showStatusPrompt();
          });
        });
      }
    });
  });
});

document.getElementById('statusCancel').addEventListener('click', function() {
  if (!currentEvent) return;
  if (confirm(`Permanently cancel "${currentEvent.title}"?`)) {
    db.ref(`users/${user.uid}/events/${currentEvent.date}/${currentEvent.id}`).remove().then(() => {
      document.getElementById('statusModal').classList.remove('show');
      pendingEvents.shift();
      renderCalendar();
      if (pendingEvents.length) showStatusPrompt();
    });
  }
});

// ===== TRACKING =====
function openTracking(status) {
  document.getElementById('trackingTitle').textContent = status === 'completed' ? '✅ Completed (last 30 days)' : '⏳ Incomplete (last 30 days)';
  document.getElementById('trackingModal').classList.add('show');
  loadTracking(status);
}

document.getElementById('closeTrackingModal').addEventListener('click', () => {
  document.getElementById('trackingModal').classList.remove('show');
});

function loadTracking(status) {
  const list = document.getElementById('trackingList');
  if (!user) return;
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  db.ref(`users/${user.uid}/events`).once('value').then(snap => {
    const all = snap.val() || {};
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 30);
    cutoff.setHours(0,0,0,0);
    const items = [];
    Object.entries(all).forEach(([iso, day]) => {
      Object.entries(day).forEach(([id, ev]) => {
        if (ev.status === status && new Date(iso) >= cutoff) {
          items.push({ date: iso, id, ...ev });
        }
      });
    });
    items.sort((a, b) => b.timestamp - a.timestamp);
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<div class="empty-state">No events found</div>';
      return;
    }
    items.forEach(ev => {
      const div = document.createElement('div');
      div.className = `task-item ${status === 'completed' ? '' : 'event-item'}`;
      div.innerHTML = `
        <div class="info">
          <div class="title">${ev.title}</div>
          <div style="font-size:0.75rem;color:var(--text-light);">${formatDate(ev.date)} at ${ev.time} ${ev.location ? '📍 '+ev.location : ''}</div>
          ${ev.desc ? `<div class="desc">${ev.desc}</div>` : ''}
        </div>
        ${status === 'incomplete' ? `<div class="actions"><button class="done" onclick="updateStatus({date:'${ev.date}',id:'${ev.id}'},'${STATUS.COMPLETED}',false)">Done</button></div>` : ''}
      `;
      list.appendChild(div);
    });
  });
}

// ===== NOTIFICATIONS =====
async function checkNotifications() {
  if (!user || Notification.permission !== 'granted') return;
  const snap = await db.ref(`users/${user.uid}/events`).once('value');
  const all = snap.val() || {};
  const now = Date.now();
  const tolerance = 12 * 3600000;
  Object.entries(all).forEach(([iso, day]) => {
    Object.entries(day).forEach(([id, ev]) => {
      if (ev.status === STATUS.PENDING && ev.timestamp && ev.timestamp <= now && ev.timestamp > now - tolerance) {
        try {
          new Notification(`⏰ ${ev.title}`, {
            body: `${ev.time}${ev.location ? ' · '+ev.location : ''}`,
            icon: '📅'
          });
        } catch(e) { console.log('Notification error:', e); }
      }
    });
  });
}

if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
  Notification.requestPermission();
}

// ===== SEARCH =====
let searchTimeout;
const searchInput = document.getElementById('searchInput');

// Enter search mode on focus
searchInput.addEventListener('focus', function() {
  if (!document.body.classList.contains('search-mode')) {
    enterSearchMode();
  }
});

searchInput.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(performSearch, 300);
});

document.getElementById('searchTimeframe').addEventListener('change', performSearch);

// Close search on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.body.classList.contains('search-mode')) {
    exitSearchMode();
  }
});

function performSearch() {
  const query = searchInput.value.trim().toLowerCase();
  const tf = document.getElementById('searchTimeframe').value;
  const results = document.getElementById('searchResults');
  
  if (!query) {
    results.innerHTML = '';
    return;
  }
  
  if (!user) return;
  
  db.ref(`users/${user.uid}`).once('value').then(snap => {
    const data = snap.val() || {};
    const tasks = data.tasks || {};
    const events = data.events || {};
    let matches = [];
    const cutoff = tf === '1year' ? new Date(Date.now() - 365*24*3600000) : null;
    
    Object.entries(tasks).forEach(([iso, day]) => {
      if (cutoff && new Date(iso) < cutoff) return;
      Object.entries(day).forEach(([id, item]) => {
        if (item.title?.toLowerCase().includes(query) || item.desc?.toLowerCase().includes(query)) {
          matches.push({ ...item, date: iso, id, type: 'task' });
        }
      });
    });
    
    Object.entries(events).forEach(([iso, day]) => {
      if (cutoff && new Date(iso) < cutoff) return;
      Object.entries(day).forEach(([id, item]) => {
        if (item.title?.toLowerCase().includes(query) || item.desc?.toLowerCase().includes(query)) {
          matches.push({ ...item, date: iso, id, type: 'event' });
        }
      });
    });
    
    results.innerHTML = '';
    if (!matches.length) {
      results.innerHTML = '<div class="empty-state">No results found</div>';
      return;
    }
    
    matches.slice(0, 20).forEach(item => {
      const div = document.createElement('div');
      div.className = 'result';
      div.innerHTML = `
        <div class="title">${item.type === 'event' ? '📅' : '📌'} ${item.title}</div>
        <div class="meta">${formatDate(item.date)}${item.desc ? ' · '+item.desc : ''}</div>
      `;
      div.onclick = () => {
        exitSearchMode();
        openTaskModal(item.date);
      };
      results.appendChild(div);
    });
  });
}

// ===== PDF DOWNLOAD =====
document.getElementById('downloadPDF').addEventListener('click', async function() {
  if (!user) return alert('Login first');
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  const snap = await db.ref(`users/${user.uid}/tasks`).once('value');
  const tasks = snap.val() || {};
  const rows = [];
  const days = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const dt = new Date(Date.UTC(y, m, d));
    const iso = toISO(dt);
    if (tasks[iso]) {
      Object.values(tasks[iso]).forEach(t => {
        rows.push([`${String(d).padStart(2,'0')}-${String(m+1).padStart(2,'0')}-${y}`, t.title, t.desc||'']);
      });
    }
  }
  if (!rows.length) return alert('No tasks this month');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text(`Tasks: ${currentDate.toLocaleString('default', { month: 'long' })} ${y}`, 14, 20);
  doc.autoTable({ startY: 30, head: [['Date', 'Task', 'Description']], body: rows, styles: { fontSize: 9 } });
  doc.save(`tasks_${y}_${m+1}.pdf`);
});

// ===== REAL TIME CHECKS =====
function startChecks() {
  setInterval(() => {
    checkPending();
    if (Notification.permission === 'granted') checkNotifications();
  }, 60000);
}

// ===== WINDOW RESIZE =====
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    const cells = document.querySelectorAll('.cell');
    cells.forEach(cell => {
      const tasksDiv = cell.querySelector('.tasks');
      if (tasksDiv) {
        const iso = tasksDiv.id.replace('tasks-', '');
        loadCellTasks(iso);
      }
    });
  }, 300);
});

// ===== INIT =====
renderCalendar();
</script>
</body>
</html>
