<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Savig · Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ---------- ROOT VARIABLES ---------- */
        :root {
            --bg-page: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-muted: #475569;
            --border-light: #e2e8f0;
            --indigo: #4f46e5;
            --emerald: #059669;
            --rose: #e11d48;
            --shadow: 0 4px 12px rgba(0,0,0,0.04);
            --radius: 16px;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --nav-text: #000000;
            --border-color: rgba(0, 0, 0, 0.08);
            --modal-text: #0f172a;
            --modal-text-muted: #334155;
            --modal-bg: #ffffff;
            --modal-border: #e2e8f0;
            --item-bg: #f8fafc;
            --detail-text: #1e293b;
            --close-btn-hover: #be123c;
            --tracking-bg: #fafafa;
        }
        [data-theme="dark"] {
            --bg-page: #0f1a2e;
            --card-bg: #1a2a40;
            --text-primary: #eef2f6;
            --text-muted: #9aa9b9;
            --border-light: #2d4055;
            --indigo: #818cf8;
            --emerald: #34d399;
            --rose: #fb7185;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --nav-bg: rgba(15, 23, 42, 0.98);
            --nav-text: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
            --modal-text: #eef2f6;
            --modal-text-muted: #c8d6e0;
            --modal-bg: #1a2a40;
            --modal-border: #2d4055;
            --item-bg: #1e2e44;
            --detail-text: #c8d6e0;
            --close-btn-hover: #fda4af;
            --tracking-bg: #142235;
        }
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            transition: background 0.25s, color 0.25s;
            padding: 0 0 80px 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== CLOSE BUTTON HOVER ===== */
        .close-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            color: var(--rose);
            background: transparent;
            border: none;
            font-size: 2rem;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .close-btn:hover {
            color: var(--close-btn-hover) !important;
            transform: scale(1.2);
            background: rgba(225, 29, 72, 0.1);
        }
        .close-btn:active {
            transform: scale(0.9);
        }
        [data-theme="dark"] .close-btn:hover {
            background: rgba(251, 113, 133, 0.15);
        }

        /* ===== CALENDAR GRID - 2 COLUMNS ON MOBILE ===== */
        #calendar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 10px 20px 10px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        @media (min-width: 640px) {
            #calendar {
                grid-template-columns: repeat(7, 1fr);
                gap: 8px;
                padding: 0 4px 20px 4px;
                max-width: 1000px;
            }
        }
        @media (max-width: 380px) {
            #calendar {
                gap: 6px;
                padding: 0 6px 16px 6px;
            }
        }

        /* ===== CALENDAR CELL ===== */
        .calendar-cell {
            background: var(--card-bg);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius);
            padding: 8px 8px 8px 8px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            transition: 0.15s;
            cursor: pointer;
            width: 100%;
            overflow: hidden;
        }
        [data-theme="dark"] .calendar-cell {
            background: var(--card-bg);
            border-color: #2d4055;
        }
        .calendar-cell:active {
            transform: scale(0.97);
        }
        @media (min-width: 640px) {
            .calendar-cell {
                min-height: 120px;
                padding: 10px 8px 8px 8px;
            }
            .calendar-cell:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            }
        }

        /* TODAY - Blue Border */
        .calendar-cell.today {
            border-color: var(--indigo);
            border-width: 3px;
            background: #eef2ff;
        }
        [data-theme="dark"] .calendar-cell.today {
            background: #1a2d44;
            border-color: #818cf8;
        }

        .calendar-cell.sunday-cell {
            background: #fef2f2;
            border-color: #fca5a5;
        }
        [data-theme="dark"] .calendar-cell.sunday-cell {
            background: #2d1b24;
            border-color: #f87171;
        }

        /* ===== DAY NUMBER ===== */
        .day-number {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        @media (max-width: 380px) {
            .day-number {
                font-size: 0.85rem;
            }
        }
        .weekday-mobile {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ===== TASK PILLS ===== */
        .task-container {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .task-pill {
            font-size: 0.75rem !important;
            padding: 2px 8px;
            border-radius: 20px;
            background: #e0e7ff;
            color: #1e293b;
            border-left: 3px solid var(--indigo);
            font-weight: 500;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            min-height: 22px;
        }
        @media (max-width: 380px) {
            .task-pill {
                font-size: 0.7rem !important;
                padding: 1px 6px;
                min-height: 20px;
            }
        }
        [data-theme="dark"] .task-pill {
            background: #2d4055;
            color: #e2e8f0;
            border-left-color: #818cf8;
        }
        .event-pill {
            background: #d1fae5;
            border-left-color: var(--emerald);
        }
        [data-theme="dark"] .event-pill {
            background: #1a3a3a;
            border-left-color: #34d399;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 12px 8px 12px;
            max-width: 800px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 8px;
        }
        @media (min-width: 640px) {
            .header { max-width: 1000px; padding: 16px 12px 12px 12px; }
        }
        #monthYear {
            font-weight: 800;
            color: var(--text-primary);
            font-size: 1.2rem;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        @media (min-width: 640px) {
            #monthYear { font-size: 1.6rem; }
        }

        /* ===== WEEKDAY HEADER ===== */
        .calendar-header {
            display: none;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 6px 8px 8px 8px;
            max-width: 1000px;
            margin: 0 auto;
        }
        @media (min-width: 640px) {
            .calendar-header { display: grid; }
        }
        [data-theme="dark"] .calendar-header div {
            color: #8a9aa8;
        }

        /* ===== SEARCH & CONTROLS ===== */
        .search-container {
            background: var(--bg-page);
            padding: 10px 12px;
            gap: 6px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            width: 100%;
        }
        
        .search-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            align-items: center;
            flex: 2;
            min-width: 200px;
        }

        .search-back {
            display: none !important;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: var(--shadow);
        }
        .search-back:hover {
            background: var(--indigo);
            color: #fff;
            border-color: var(--indigo);
            transform: scale(1.05);
        }
        .search-back:active { transform: scale(0.92); }
        .search-container .search-back.show { display: flex !important; }
        
        #searchInput {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 1rem !important;
            flex: 1;
            min-width: 80px;
            outline: none;
            transition: border 0.2s;
        }
        [data-theme="dark"] #searchInput {
            background: #1a2a3a;
            border-color: #3a4f64;
            color: #eef2f6;
        }
        #searchInput::placeholder { color: var(--text-muted); }
        #searchInput:focus { border-color: var(--indigo); }

        #searchTimeframe {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 40px;
            padding: 12px 16px;
            font-size: 0.85rem !important;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            box-shadow: var(--shadow);
            appearance: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }
        [data-theme="dark"] #searchTimeframe {
            background: #1a2a3a;
            border-color: #3a4f64;
            color: #eef2f6;
        }

        .btn-control {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 0.85rem !important;
            font-weight: 600;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            box-shadow: var(--shadow);
            cursor: pointer;
        }
        [data-theme="dark"] .btn-control {
            background: #1e2a3a;
            border-color: #3a4f64;
            color: #e2e8f0;
        }
        .btn-control:hover { opacity: 0.8; transform: scale(0.96); }
        .btn-primary { background: var(--indigo); color: white; border: none; }
        .btn-emerald { background: var(--emerald); color: white; border: none; }
        .btn-rose { background: var(--rose); color: white; border: none; }
        .btn-control i { font-size: 0.9rem; }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
        }

        .action-row .btn-group {
            display: flex;
            gap: 4px;
            flex: 1;
            min-width: 160px;
            justify-content: center;
        }
        .action-row .btn-group .btn-control {
            flex: 1;
            min-width: 70px;
            justify-content: center;
        }

        @media (max-width: 640px) {
            .search-container {
                flex-direction: column;
                align-items: stretch;
            }
            .search-row {
                flex: 1;
                width: 100%;
            }
            .action-row {
                justify-content: center;
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
            .action-row .btn-group {
                flex: 1;
                width: 100%;
            }
            .action-row .btn-group .btn-control {
                flex: 1;
                min-width: 60px;
                justify-content: center;
                font-size: 0.7rem !important;
                padding: 6px 8px;
            }
        }

        @media (max-width: 480px) {
            .btn-control { font-size: 0.8rem !important; padding: 6px 10px; }
            #searchInput { font-size: 0.95rem !important; padding: 10px 14px; }
            #searchTimeframe { font-size: 0.8rem !important; padding: 10px 12px; }
            .search-back { width: 38px; height: 38px; font-size: 1rem; }
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        [data-theme="dark"] .modal-overlay {
            background: rgba(0,0,0,0.6);
        }
        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--modal-border);
            border-radius: 24px;
            max-width: 96%;
            width: 480px;
            max-height: 92vh;
            overflow-y: auto;
            padding: 24px 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            color: var(--modal-text);
        }
        .modal-card input, .modal-card textarea, .modal-card select {
            background: var(--bg-page);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 14px;
            padding: 12px 16px;
            width: 100%;
            font-size: 0.95rem;
            transition: 0.15s;
        }
        [data-theme="dark"] .modal-card input,
        [data-theme="dark"] .modal-card textarea {
            background: #1a2a3a;
            border-color: #3a4f64;
            color: #eef2f6;
        }
        @media (max-width: 480px) {
            .modal-card { padding: 16px 14px; }
        }

        /* ===== BOTTOM NAVIGATION ===== */
        #universal-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 52px !important;
            background-color: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.06);
            z-index: 999999;
            padding-bottom: env(safe-area-inset-bottom);
            animation: navSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            font-size: 14px;
        }

  

        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--nav-text) !important;
            text-decoration: none !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            height: 35px;
            cursor: pointer;
            background: transparent;
            border: none;
        }

        .nav-link i {
            font-size: 21px !important;
            margin-bottom: 4px;
            color: inherit;
            -webkit-text-stroke: 0.5px var(--nav-text);
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link div {
            font-size: 9px !important;
            font-weight: 800;
            text-transform: uppercase;
            color: inherit;
            letter-spacing: 0.02em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link:hover {
            transform: translateY(-4px);
            color: blue !important;
        }
        .nav-link:hover i {
            color: blue !important;
            -webkit-text-stroke: 0.5px #2563eb;
        }
        .nav-link:hover div {
            color: #2563eb !important;
        }

        .nav-link:active {
            transform: scale(0.92) !important;
            transition: transform 0.1s ease;
        }

        [data-theme="dark"] #universal-bottom-nav {
            background-color: #0f172a;
            border-top-color: rgba(255, 255, 255, 0.08);
        }
        [data-theme="dark"] .nav-link {
            color: #ffffff !important;
        }
        [data-theme="dark"] .nav-link i {
            color: #ffffff !important;
            -webkit-text-stroke: 0.5px #ffffff;
        }
        [data-theme="dark"] .nav-link div {
            color: #ffffff !important;
        }
        [data-theme="dark"] .nav-link:hover {
            color: blue !important;
        }
        [data-theme="dark"] .nav-link:hover i {
            color: blue !important;
            -webkit-text-stroke: 0.5px #818cf8;
        }
        [data-theme="dark"] .nav-link:hover div {
            color: #818cf8 !important;
        }

        /* ===== SEARCH RESULTS ===== */
        .search-results-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            box-shadow: var(--shadow);
        }
        [data-theme="dark"] .search-results-panel {
            background: #1a2a3a;
        }
        #searchResults .result {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.15s;
        }
        #searchResults .result:active { transform: scale(0.98); }
        #searchResults .result .title { font-weight: 600; font-size: 0.9rem; }
        #searchResults .result .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }

        /* ===== FOCUS MODE ===== */
        body.focus-mode #universal-bottom-nav,
        body.focus-mode .search-container,
        body.focus-mode .header,
        body.focus-mode .calendar-header,
        body.focus-mode #calendar {
            display: none !important;
        }
        body.focus-mode #taskModal {
            display: flex !important;
            position: fixed !important;
            inset: 0 !important;
            z-index: 10000 !important;
            background: var(--bg-page) !important;
            border-radius: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow-y: auto !important;
            align-items: flex-start !important;
            padding-top: 10px !important;
        }
        body.focus-mode .modal-overlay {
            background: var(--bg-page) !important;
            align-items: flex-start !important;
            padding-top: 10px !important;
        }
        body.focus-mode .modal-card {
            max-width: 100% !important;
            width: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            background: var(--bg-page) !important;
            border: none !important;
            padding: 16px 12px !important;
            margin-top: 0 !important;
            max-height: none !important;
            color: var(--text-primary) !important;
        }

        /* ===== SEARCH MODE ===== */
        body.search-mode .header,
        body.search-mode .calendar-header,
        body.search-mode #calendar,
        body.search-mode #universal-bottom-nav,
        body.search-mode .action-row {
            display: none !important;
        }
        body.search-mode .search-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-page);
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            flex-direction: row !important;
            flex-wrap: nowrap !important;
        }
        body.search-mode .search-row {
            flex: 1;
            width: auto;
        }
        body.search-mode .search-container input {
            font-size: 1.1rem;
            padding: 14px 18px;
        }
        body.search-mode #searchResults {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            background: var(--bg-page);
            padding: 12px 16px;
            overflow-y: auto;
            max-width: 100%;
        }

        /* ===== RESPONSIVE NAV ===== */
        @media (max-width: 480px) {
            #universal-bottom-nav {
                height: 52px !important;
            }
            .nav-link i {
                font-size: 21px !important;
            }
            .nav-link div {
                font-size: 9px !important;
            }
            .nav-link {
                height: 35px;
            }
        }
        @media (max-width: 380px) {
            #universal-bottom-nav {
                height: 52px !important;
            }
            .nav-link i {
                font-size: 21px !important;
            }
            .nav-link div {
                font-size: 9px !important;
            }
            .nav-link {
                height: 35px;
            }
        }

        /* --- MOBILE MODAL IMPROVEMENTS --- */
        @media (max-width: 640px) {
            #taskModal .modal-card {
                padding: 12px 10px !important;
            }
            #taskModal .grid-cols-1.md\:grid-cols-2 {
                grid-template-columns: 1fr !important;
            }
            #taskModal #existingTasks {
                max-height: 400px !important;
                min-height: 250px;
                font-size: 0.95rem !important;
                background: var(--item-bg) !important;
                color: var(--modal-text) !important;
            }
            #taskModal #existingTasks .p-3 {
                font-size: 0.95rem !important;
                color: var(--modal-text) !important;
                background: var(--item-bg) !important;
            }
            #taskModal #existingTasks .font-bold {
                font-size: 0.95rem !important;
                color: var(--modal-text) !important;
            }
            #taskModal #existingTasks .text-xs {
                font-size: 0.85rem !important;
                color: var(--detail-text) !important;
            }
            #taskModal #existingTasks .text-gray-500 {
                color: var(--detail-text) !important;
            }
            #taskModal #existingTasks .text-emerald-600 {
                color: var(--emerald) !important;
            }
            #taskModal #existingTasks .text-indigo-600 {
                color: var(--indigo) !important;
            }
            #taskModal #existingTasks .border-emerald-500 {
                border-color: var(--emerald) !important;
            }

    <!-- ====== FIREBASE + APP SCRIPT ====== -->
    <script>
        // ---------- FIREBASE CONFIG ----------
        const firebaseConfig = {
            apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
            authDomain: "sk12-58e9e.firebaseapp.com",
            databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com",
            projectId: "sk12-58e9e",
            storageBucket: "sk12-58e9e.firebasestorage.app",
            messagingSenderId: "470207874652",
            appId: "1:470207874652:web:67ba1cf3629b7e5b144899"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ---------- THEME ----------
        (function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();

        // ---------- STATE ----------
        let currentUser = null;
        let currentDate = new Date();
        let selectedDate = null;
        let editTaskId = null;
        let editEventId = null;
        let eventsToPrompt = [];
        let currentEventForAction = null;
        const EVENT_STATUS = { PENDING: 'pending', COMPLETED: 'completed', INCOMPLETE: 'incomplete' };
        const NOTIFICATION_TOLERANCE_MS = 12 * 3600000;
        let isLoading = false;
        let currentDateRef = null;

        // DOM refs
        const calEl = document.getElementById('calendar');
        const monthYear = document.getElementById('monthYear');
        const searchInput = document.getElementById('searchInput');
        const searchTimeframe = document.getElementById('searchTimeframe');
        const searchResults = document.getElementById('searchResults');
        const taskModal = document.getElementById('taskModal');
        const eventModal = document.getElementById('eventModal');
        const statusModal = document.getElementById('statusPromptModal');
        const trackingModal = document.getElementById('eventTrackingSection');
        const rescheduleModal = document.getElementById('rescheduleModal');

        // Helpers
        function toISODate(d) {
            return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        }
        function capitalize(s) { return s ? s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ') : ''; }
        function formatDate(iso) {
            const [y,m,d] = iso.split('-').map(Number);
            const dt = new Date(Date.UTC(y,m-1,d));
            return `${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}-${y} (${dt.toLocaleDateString('en',{weekday:'short',timeZone:'UTC'})})`;
        }

        // ---------- SEARCH MODE ----------
        function enterSearchMode() {
            document.body.classList.add('search-mode');
            document.getElementById('searchBackBtn').classList.add('show');
            searchInput.focus();
        }

        function exitSearchMode() {
            document.body.classList.remove('search-mode');
            document.getElementById('searchBackBtn').classList.remove('show');
            searchInput.value = '';
            searchResults.innerHTML = '';
        }

        // ---------- AUTH ----------
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                renderCalendar();
                startRealTimeChecks();
                checkAndPromptForEventStatus();
            } else {
                window.location.href = 'index.html';
            }
        });

        // ---------- CALENDAR RENDER ----------
        function renderCalendar() {
            if (!currentUser) return;
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            monthYear.textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            calEl.innerHTML = '';
            const firstDay = new Date(y,m,1);
            let start = (firstDay.getDay() + 6) % 7;
            const days = new Date(y,m+1,0).getDate();

            if (window.innerWidth >= 640) {
                for (let i=0; i<start; i++) {
                    const empty = document.createElement('div');
                    empty.className = 'calendar-cell';
                    empty.style.opacity = '0.2';
                    empty.style.pointerEvents = 'none';
                    calEl.appendChild(empty);
                }
            }

            const todayISO = toISODate(new Date());
            for (let d=1; d<=days; d++) {
                const dateObj = new Date(Date.UTC(y,m,d));
                const iso = toISODate(dateObj);
                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                if (iso === todayISO) cell.classList.add('today');
                const dow = dateObj.getUTCDay();
                if (dow === 0) cell.classList.add('sunday-cell');

                const dayNum = document.createElement('div');
                dayNum.className = 'day-number';
                dayNum.innerHTML = `<span>${d}</span><span class="weekday-mobile">${dateObj.toLocaleDateString('en',{weekday:'short',timeZone:'UTC'})}</span>`;
                cell.appendChild(dayNum);

                const taskContainer = document.createElement('div');
                taskContainer.className = 'task-container';
                taskContainer.id = `tasks-${iso}`;
                cell.appendChild(taskContainer);

                cell.onclick = () => openModal(iso);
                calEl.appendChild(cell);

                loadCellContent(iso);
            }
        }

        function loadCellContent(dateISO) {
            if (!currentUser) return;
            const container = document.getElementById(`tasks-${dateISO}`);
            if (!container) return;
            container.innerHTML = '';
            db.ref(`users/${currentUser.uid}`).once('value').then(snap => {
                const data = snap.val() || {};
                const tasks = data.tasks?.[dateISO] || {};
                const events = data.events?.[dateISO] || {};
                const items = [];
                const seen = new Set();
                
                Object.entries(tasks).forEach(([id, t]) => {
                    const key = `task-${id}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        items.push({ type: 'task', id, ...t });
                    }
                });
                
                Object.entries(events).forEach(([id, e]) => {
                    if (e.status === EVENT_STATUS.PENDING) {
                        const key = `event-${id}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            items.push({ type: 'event', id, ...e });
                        }
                    }
                });
                
                items.sort((a,b) => {
                    if (a.type === 'event' && b.type === 'task') return -1;
                    if (a.type === 'task' && b.type === 'event') return 1;
                    return 0;
                });
                
                const maxItems = window.innerWidth < 640 ? 3 : 4;
                items.slice(0, maxItems).forEach(item => {
                    const pill = document.createElement('div');
                    pill.className = `task-pill ${item.type === 'event' ? 'event-pill' : ''}`;
                    pill.textContent = `${item.type === 'event' ? '🔔 ' : '• '}${item.title}`;
                    pill.dataset.id = item.id;
                    pill.dataset.type = item.type;
                    container.appendChild(pill);
                });
            });
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
        }

        // ---------- MODAL OPEN/CLOSE ----------
        function openModal(dateISO) {
            if (isLoading) return;
            selectedDate = dateISO;
            document.getElementById('modalDate').textContent = `📋 Tasks: ${formatDate(dateISO)}`;
            taskModal.classList.remove('hidden');
            document.body.classList.add('focus-mode');
            loadModalTasks(dateISO);
        }
        function closeModal() {
            taskModal.classList.add('hidden');
            document.body.classList.remove('focus-mode');
            editTaskId = null;
            isLoading = false;
        }
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('cancelTaskBtn').addEventListener('click', closeModal);

        function openEventModal(dateISO = null) {
            const d = dateISO || toISODate(new Date());
            document.getElementById('eventDate').value = d;
            document.getElementById('eventTime').value = '09:00';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventLocation').value = '';
            document.getElementById('eventDesc').value = '';
            editEventId = null;
            eventModal.classList.remove('hidden');
        }
        function closeEventModal() { eventModal.classList.add('hidden'); editEventId = null; }
        document.getElementById('closeEventModal').addEventListener('click', closeEventModal);
        document.getElementById('cancelEventBtn').addEventListener('click', closeEventModal);
        document.getElementById('openEventModalBtn').addEventListener('click', () => openEventModal(toISODate(currentDate)));

        function closeStatusPromptModal() {
            statusModal.classList.add('hidden');
            currentEventForAction = null;
            if (eventsToPrompt.length) processNextPendingEvent();
        }
        document.getElementById('closeStatusPromptModal').addEventListener('click', closeStatusPromptModal);

        function closeTrackingModal() { trackingModal.classList.add('hidden'); }
        document.getElementById('closeTrackingModal').addEventListener('click', closeTrackingModal);

        function closeRescheduleModal() { rescheduleModal.classList.add('hidden'); }
        document.getElementById('closeRescheduleModal').addEventListener('click', closeRescheduleModal);

        // ---------- LOAD MODAL TASKS ----------
        function loadModalTasks(date) {
            if (isLoading) return;
            isLoading = true;
            const cont = document.getElementById('existingTasks');
            cont.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">Loading...</div>';
            if (!currentUser) {
                isLoading = false;
                return;
            }
            
            if (currentDateRef) {
                currentDateRef.off();
                currentDateRef = null;
            }
            
            const taskRef = db.ref(`users/${currentUser.uid}/tasks/${date}`);
            const eventRef = db.ref(`users/${currentUser.uid}/events/${date}`);
            
            Promise.all([taskRef.once('value'), eventRef.once('value')]).then(([ts, es]) => {
                const tasks = ts.val() || {};
                const events = es.val() || {};
                let items = [];
                const seen = new Set();
                
                Object.entries(tasks).forEach(([id, t]) => {
                    const key = `task-${id}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        items.push({ type: 'task', id, date, ...t });
                    }
                });
                
                Object.entries(events).forEach(([id, e]) => {
                    if (e.status === EVENT_STATUS.PENDING) {
                        const key = `event-${id}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            items.push({ type: 'event', id, date, ...e });
                        }
                    }
                });
                
                items.sort((a,b) => {
                    if (a.type === 'event' && b.type === 'task') return -1;
                    if (a.type === 'task' && b.type === 'event') return 1;
                    return 0;
                });
                
                cont.innerHTML = '';
                if (!items.length) {
                    cont.innerHTML = '<div class="text-center text-gray-600 italic text-sm py-6">✨ All clear</div>';
                    isLoading = false;
                    return;
                }
                items.forEach(item => {
                    const isEvent = item.type === 'event';
                    const div = document.createElement('div');
                    div.className = `task-item p-3 mb-2 rounded-xl border-l-4 ${isEvent ? 'border-emerald-500 bg-emerald-50 dark:bg-slate-800' : 'border-indigo-500 bg-indigo-50 dark:bg-slate-800'} flex justify-between items-start gap-2`;
                    div.innerHTML = `
                        <div class="flex-1">
                            <div class="task-title">${isEvent ? '📅 ' : '📌 '}${item.title}</div>
                            ${isEvent ? `<div class="text-xs" style="color: var(--emerald) !important;">🕒 ${item.time}</div>` : ''}
                            ${item.desc ? `<div class="task-desc">${item.desc}</div>` : ''}
                        </div>
                        <div class="flex flex-col gap-1 shrink-0">
                            <button onclick="editItem('${item.type}','${item.id}','${item.date}')" class="action-btn edit-btn" style="font-size:0.85rem !important; padding:4px 14px;">Edit</button>
                            <button onclick="deleteItem('${item.type}','${item.id}','${item.date}')" class="action-btn delete-btn" style="font-size:0.85rem !important; padding:4px 14px;">Delete</button>
                            ${isEvent ? `<button onclick="openRescheduleFromEvent('${item.id}','${item.date}')" class="action-btn reschedule-btn" style="font-size:0.75rem !important; padding:4px 14px;">🔄 Reschedule</button>` : ''}
                        </div>
                    `;
                    cont.appendChild(div);
                });
                isLoading = false;
            }).catch(err => {
                console.error('Error loading tasks:', err);
                cont.innerHTML = '<div class="text-center text-red-500 text-sm py-4">Error loading data</div>';
                isLoading = false;
            });
        }

        // CRUD helpers
        window.editItem = function(type, id, date) {
            if (type === 'event') {
                db.ref(`users/${currentUser.uid}/events/${date}/${id}`).once('value').then(snap => {
                    const ev = snap.val();
                    if (!ev) return;
                    editEventId = id;
                    document.getElementById('eventTitle').value = ev.title || '';
                    document.getElementById('eventDate').value = date;
                    document.getElementById('eventTime').value = ev.time || '09:00';
                    document.getElementById('eventLocation').value = ev.location || '';
                    document.getElementById('eventDesc').value = ev.desc || '';
                    eventModal.classList.remove('hidden');
                });
            } else {
                db.ref(`users/${currentUser.uid}/tasks/${date}/${id}`).once('value').then(snap => {
                    const task = snap.val();
                    if (!task) return;
                    editTaskId = id;
                    selectedDate = date;
                    document.getElementById('taskTitle').value = task.title || '';
                    document.getElementById('taskDesc').value = task.desc || '';
                    taskModal.classList.remove('hidden');
                    document.body.classList.add('focus-mode');
                });
            }
        };
        window.deleteItem = function(type, id, date) {
            if (!confirm(`Delete this ${type}?`)) return;
            const path = type === 'event' ? 'events' : 'tasks';
            db.ref(`users/${currentUser.uid}/${path}/${date}/${id}`).remove().then(() => {
                renderCalendar();
                if (selectedDate === date) loadModalTasks(date);
            });
        };

        window.openRescheduleFromEvent = function(id, date) {
            db.ref(`users/${currentUser.uid}/events/${date}/${id}`).once('value').then(snap => {
                const ev = snap.val();
                if (!ev) return;
                currentEventForAction = { date, id, ...ev };
                document.getElementById('rescheduleEventTitle').textContent = ev.title;
                document.getElementById('rescheduleDate').value = date;
                document.getElementById('rescheduleTime').value = ev.time || '09:00';
                rescheduleModal.classList.remove('hidden');
            });
        };

        // ---------- SAVE TASK ----------
        document.getElementById('saveTaskBtn').addEventListener('click', function() {
            if (!currentUser) return;
            const title = capitalize(document.getElementById('taskTitle').value.trim());
            const desc = capitalize(document.getElementById('taskDesc').value.trim());
            if (!title) return alert('Enter a task title');
            const ref = db.ref(`users/${currentUser.uid}/tasks/${selectedDate}`);
            const data = { title, desc };
            if (editTaskId) {
                ref.child(editTaskId).set(data).then(() => { editTaskId = null; loadModalTasks(selectedDate); renderCalendar(); });
            } else {
                ref.push(data).then(() => { loadModalTasks(selectedDate); renderCalendar(); });
            }
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
        });

        // ---------- SAVE EVENT ----------
        document.getElementById('saveEventBtn').addEventListener('click', function() {
            if (!currentUser) return;
            const title = capitalize(document.getElementById('eventTitle').value.trim());
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            if (!title || !date || !time) return alert('Title, date & time required');
            const location = capitalize(document.getElementById('eventLocation').value.trim());
            const desc = capitalize(document.getElementById('eventDesc').value.trim());
            const eventData = { title, time, location, desc, timestamp: new Date(`${date}T${time}:00`).getTime(), savedTimestamp: Date.now(), status: EVENT_STATUS.PENDING };
            const ref = db.ref(`users/${currentUser.uid}/events/${date}`);
            if (editEventId) {
                ref.child(editEventId).set(eventData).then(() => { editEventId = null; closeEventModal(); renderCalendar(); });
            } else {
                ref.push(eventData).then(() => { closeEventModal(); renderCalendar(); });
            }
        });

        // ---------- STATUS PROMPT LOGIC ----------
        async function checkAndPromptForEventStatus() {
            if (!currentUser) return;
            const snap = await db.ref(`users/${currentUser.uid}/events`).once('value');
            const all = snap.val() || {};
            eventsToPrompt = [];
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            Object.entries(all).forEach(([dateISO, dayEvents]) => {
                Object.entries(dayEvents).forEach(([id, ev]) => {
                    const [y,m,d] = dateISO.split('-').map(Number);
                    const eventDay = new Date(y,m-1,d).getTime();
                    if (ev.status === EVENT_STATUS.PENDING && todayStart > eventDay) {
                        eventsToPrompt.push({ date: dateISO, id, ...ev });
                    }
                });
            });
            if (eventsToPrompt.length) processNextPendingEvent();
        }

        function processNextPendingEvent() {
            if (!eventsToPrompt.length) { statusModal.classList.add('hidden'); return; }
            const ev = eventsToPrompt[0];
            currentEventForAction = ev;
            document.getElementById('eventToPromptTitle').textContent = ev.title;
            document.getElementById('eventToPromptDate').textContent = formatDate(ev.date);
            document.getElementById('eventToPromptTime').textContent = ev.time;
            statusModal.classList.remove('hidden');
        }

        window.updateEventStatus = function(event, status, calledFromModal = false) {
            if (!currentUser || !event.date || !event.id) return;
            db.ref(`users/${currentUser.uid}/events/${event.date}/${event.id}`).update({ status }).then(() => {
                renderCalendar();
                if (calledFromModal && selectedDate === event.date) loadModalTasks(event.date);
                if (eventsToPrompt.length && eventsToPrompt[0]?.id === event.id) {
                    eventsToPrompt.shift();
                    closeStatusPromptModal();
                }
                if (!trackingModal.classList.contains('hidden')) {
                    const mode = trackingModal.querySelector('h2').textContent.includes('Completed') ? 'completed' : 'incomplete';
                    loadTrackingEvents(mode);
                }
            });
        };

        // ---------- RESCHEDULE ----------
        document.getElementById('confirmRescheduleBtn').addEventListener('click', function() {
            if (!currentEventForAction) return alert('No event');
            const newDate = document.getElementById('rescheduleDate').value;
            const newTime = document.getElementById('rescheduleTime').value;
            if (!newDate || !newTime) return alert('Select date & time');
            const ev = currentEventForAction;
            db.ref(`users/${currentUser.uid}/events/${ev.date}/${ev.id}`).update({
                date: newDate,
                time: newTime,
                timestamp: new Date(`${newDate}T${newTime}:00`).getTime()
            }).then(() => {
                const oldDate = ev.date;
                const refOld = db.ref(`users/${currentUser.uid}/events/${oldDate}/${ev.id}`);
                refOld.once('value').then(snap => {
                    const data = snap.val();
                    if (data) {
                        db.ref(`users/${currentUser.uid}/events/${newDate}`).push(data).then(() => {
                            refOld.remove().then(() => {
                                closeRescheduleModal();
                                renderCalendar();
                                if (selectedDate === oldDate || selectedDate === newDate) loadModalTasks(selectedDate);
                            });
                        });
                    }
                });
            });
        });

        document.getElementById('reschedulePromptBtn').addEventListener('click', function() {
            if (!currentEventForAction) return;
            document.getElementById('rescheduleEventTitle').textContent = currentEventForAction.title;
            document.getElementById('rescheduleDate').value = currentEventForAction.date;
            document.getElementById('rescheduleTime').value = currentEventForAction.time;
            rescheduleModal.classList.remove('hidden');
        });

        document.getElementById('cancelPromptBtn').addEventListener('click', function() {
            if (!currentEventForAction) return;
            if (confirm(`Permanently cancel "${currentEventForAction.title}"?`)) {
                db.ref(`users/${currentUser.uid}/events/${currentEventForAction.date}/${currentEventForAction.id}`).remove().then(() => {
                    closeStatusPromptModal();
                    renderCalendar();
                });
            }
        });

        document.getElementById('completeEventBtn').addEventListener('click', function() {
            if (currentEventForAction) updateEventStatus(currentEventForAction, EVENT_STATUS.COMPLETED, false);
        });
        document.getElementById('incompleteEventBtn').addEventListener('click', function() {
            if (currentEventForAction) updateEventStatus(currentEventForAction, EVENT_STATUS.INCOMPLETE, false);
        });

        // ---------- TRACKING MODAL ----------
        window.openTrackingModal = function(status) {
            trackingModal.querySelector('h2').textContent = status === 'completed' ? '✅ Completed (last 30d)' : '⏳ Incomplete (last 30d)';
            trackingModal.classList.remove('hidden');
            loadTrackingEvents(status);
        };

        function loadTrackingEvents(status) {
            const cont = document.getElementById('trackingEventsList');
            cont.innerHTML = '<div class="text-center text-gray-400 py-4">Loading...</div>';
            if (!currentUser) return;
            db.ref(`users/${currentUser.uid}/events`).once('value').then(snap => {
                const all = snap.val() || {};
                const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
                cutoff.setHours(0,0,0,0);
                const list = [];
                const seen = new Set();
                Object.entries(all).forEach(([date, day]) => {
                    Object.entries(day).forEach(([id, ev]) => {
                        if (ev.status === status && new Date(date) >= cutoff) {
                            const key = `${date}-${id}`;
                            if (!seen.has(key)) {
                                seen.add(key);
                                list.push({ date, id, ...ev });
                            }
                        }
                    });
                });
                list.sort((a,b) => b.timestamp - a.timestamp);
                cont.innerHTML = '';
                if (!list.length) { 
                    cont.innerHTML = '<div class="text-center text-gray-400 italic py-4">No events found</div>'; 
                    return; 
                }
                list.forEach(ev => {
                    const div = document.createElement('div');
                    div.className = `tracking-item ${status === 'completed' ? 'completed' : 'incomplete'}`;
                    div.innerHTML = `
                        <div class="event-title">${ev.title}</div>
                        <div class="event-meta">📅 ${formatDate(ev.date)} · 🕒 ${ev.time} ${ev.location ? '📍 '+ev.location : ''}</div>
                        ${ev.desc ? `<div class="event-desc">${ev.desc}</div>` : ''}
                        ${status === 'incomplete' ? `<button onclick="updateEventStatus({date:'${ev.date}',id:'${ev.id}'},'${EVENT_STATUS.COMPLETED}',false)" class="mark-done-btn">✅ Mark Done</button>` : ''}
                    `;
                    cont.appendChild(div);
                });
            });
        }

        // ---------- SEARCH ----------
        let searchDebounce;
        searchInput.addEventListener('focus', function() {
            if (!document.body.classList.contains('search-mode')) {
                enterSearchMode();
            }
        });
        searchInput.addEventListener('input', function() {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => performSearch(), 300);
        });
        searchTimeframe.addEventListener('change', performSearch);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.body.classList.contains('search-mode')) {
                exitSearchMode();
            }
        });

        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            const tf = searchTimeframe.value;
            if (!query) { searchResults.innerHTML = ''; return; }
            if (!currentUser) return;
            db.ref(`users/${currentUser.uid}`).once('value').then(snap => {
                const data = snap.val() || {};
                const tasks = data.tasks || {};
                const events = data.events || {};
                let matches = [];
                const seen = new Set();
                const cutoff = tf === '1year' ? new Date(Date.now()-365*24*3600000) : null;
                
                Object.entries(tasks).forEach(([date, day]) => {
                    if (cutoff && new Date(date) < cutoff) return;
                    Object.entries(day).forEach(([id, item]) => {
                        if (item.title?.toLowerCase().includes(query) || item.desc?.toLowerCase().includes(query)) {
                            const key = `task-${date}-${id}`;
                            if (!seen.has(key)) {
                                seen.add(key);
                                matches.push({ ...item, date, id, type: 'task' });
                            }
                        }
                    });
                });
                
                Object.entries(events).forEach(([date, day]) => {
                    if (cutoff && new Date(date) < cutoff) return;
                    Object.entries(day).forEach(([id, item]) => {
                        if (item.title?.toLowerCase().includes(query) || item.desc?.toLowerCase().includes(query)) {
                            const key = `event-${date}-${id}`;
                            if (!seen.has(key)) {
                                seen.add(key);
                                matches.push({ ...item, date, id, type: 'event' });
                            }
                        }
                    });
                });
                
                searchResults.innerHTML = '';
                if (!matches.length) {
                    searchResults.innerHTML = '<div class="text-center text-gray-400 py-4">No results found</div>';
                    return;
                }
                matches.slice(0, 20).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result';
                    div.innerHTML = `
                        <div class="title">${item.type === 'event' ? '📅' : '📌'} ${item.title}</div>
                        <div class="meta">${formatDate(item.date)}${item.desc ? ' · '+item.desc : ''}</div>
                    `;
                    div.onclick = () => {
                        exitSearchMode();
                        openModal(item.date);
                    };
                    searchResults.appendChild(div);
                });
            });
        }

        // ---------- REAL TIME CHECKS ----------
        function startRealTimeChecks() {
            setInterval(() => {
                checkAndPromptForEventStatus();
                if (Notification.permission === 'granted') checkAndShowNotifications();
            }, 60000);
        }

        async function checkAndShowNotifications() {
            if (!currentUser || Notification.permission !== 'granted') return;
            const snap = await db.ref(`users/${currentUser.uid}/events`).once('value');
            const all = snap.val() || {};
            const now = Date.now();
            Object.entries(all).forEach(([date, day]) => {
                Object.entries(day).forEach(([id, ev]) => {
                    if (ev.status === EVENT_STATUS.PENDING && ev.timestamp && ev.timestamp <= now && ev.timestamp > now - NOTIFICATION_TOLERANCE_MS) {
                        try {
                            new Notification(`⏰ ${ev.title}`, { body: `${ev.time}${ev.location ? ' · '+ev.location : ''}`, icon: '📅' });
                        } catch(e) { console.log('Notification error:', e); }
                    }
                });
            });
        }
        if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }

        // ---------- PDF DOWNLOAD ----------
        document.getElementById('downloadMonthTasks').addEventListener('click', async function() {
            if (!currentUser) return alert('Login first');
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            const snap = await db.ref(`users/${currentUser.uid}/tasks`).once('value');
            const tasks = snap.val() || {};
            const rows = [];
            const seen = new Set();
            const daysInMonth = new Date(y,m+1,0).getDate();
            for (let d=1; d<=daysInMonth; d++) {
                const dt = new Date(Date.UTC(y,m,d));
                const iso = toISODate(dt);
                if (tasks[iso]) {
                    Object.entries(tasks[iso]).forEach(([id, t]) => {
                        const key = `${iso}-${id}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            rows.push([`${String(d).padStart(2,'0')}-${String(m+1).padStart(2,'0')}-${y}`, t.title, t.desc||'']);
                        }
                    });
                }
            }
            if (!rows.length) return alert('No tasks this month');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text(`Tasks: ${currentDate.toLocaleString('default',{month:'long'})} ${y}`, 14, 20);
            doc.autoTable({ startY: 30, head: [['Date','Task','Description']], body: rows, styles: { fontSize: 9 } });
            doc.save(`tasks_${y}_${m+1}.pdf`);
        });

        // ---------- WINDOW RESIZE ----------
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const cells = document.querySelectorAll('.calendar-cell');
                cells.forEach(cell => {
                    const taskContainer = cell.querySelector('.task-container');
                    if (taskContainer) {
                        const iso = taskContainer.id.replace('tasks-', '');
                        loadCellContent(iso);
                    }
                });
            }, 300);
        });

        // ---------- INIT ----------
        renderCalendar();
    </script>
</body>
</html>
