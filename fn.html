        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }

        .smooth-scroll::-webkit-scrollbar { width: 5px; }
        .smooth-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        #searchOverlay { display: none; position: fixed; inset: 0; background: white; z-index: 9999; padding: 1.5rem; }
        .btn-action { background: #e0e7ff; color: #4338ca; padding: 10px; border-radius: 12px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
        .btn-edit:hover { background: #2563eb; color: white; transform: scale(1.1); }
        .btn-share:hover { background: #059669; color: white; transform: scale(1.1); }
        .btn-delete:hover { background: #dc2626; color: white; transform: scale(1.1); }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
        .data-text-main { color: #1e293b; font-weight: 800; }
        .data-text-sub { color: #475569; font-weight: 700; }

<body class="text-slate-900">

<nav class="bg-white border-b sticky top-0 z-50 shadow-sm">

            <div class="flex-shrink-0 flex items-center gap-3">
                <span class="text-blue-600 font-black text-xl tracking-tighter">Savig</span>
                <div class="h-6 w-[2px] bg-slate-200"></div>
                <span class="text-slate-500 font-bold text-sm uppercase tracking-widest">Social Hub</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center bg-blue-50 rounded-xl px-4 py-2 border border-blue-100 focus-within:border-blue-500 transition-all">
                    <i class="fas fa-search text-blue-400 mr-2"></i>
                    <input type="text" oninput="filterData(this.value)" placeholder="Search history..." class="bg-transparent outline-none text-sm w-49 font-bold text-blue-900">
                </div>
                <button onclick="openSearch()" class="md:hidden p-3 bg-blue-50 rounded-xl text-blue-600">
                    <i class="fas fa-search"></i>

</nav>

<div id="searchOverlay" class="flex flex-col">

            <i class="fas fa-arrow-left"></i>
        </button>
        <input type="text" id="mobileSearchInput" oninput="filterData(this.value)" placeholder="Search..." class="flex-1 p-1 bg-slate-50 border-2 border-blue-500 rounded-2xl outline-none text-base font-black">
    </div>

                <form id="eventForm" class="space-y-5">

                    <div>

            <option value="Meeting">💼 Business Meeting</option>
            <option value="Conference">🎤 Conference / Seminar</option>
            <option value="Get-Together">👨‍👩‍👧‍👦 Family Get-Together</option>
            <option value="Reunion">🏫 School/College Reunion</option>
            <option value="Inauguration">✂️ Opening / Inauguration</option>
            <option value="Award Ceremony">🏆 Award Ceremony</option>

</div>

                    <div>
                        <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Invited By</label>
                        <input type="text" id="invitedBy" placeholder="Person who invited" required class="w-full p-4 bg-blue-50/50 border border-blue-100 rounded-2xl outline-none mt-1 font-bold">
                    </div>

                <div id="namesContainer" class="space-y-1 max-w-[300px]"> <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Visitor Names</label>
    <div class="flex gap-1">
        <input type="text" placeholder="Name" required 
               class="person-name flex-1 p-2 text-sm bg-blue-50/50 border border-blue-100 rounded-xl outline-none font-bold">
        <button type="button" onclick="addNameField()" 
                class="bg-blue-600 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-md hover:bg-blue-700 transition-all shrink-0">
            <i class="fas fa-plus text-xs"></i>
        </button>
    </div>
</div>

                    <div class="grid grid-cols-2 gap-1">
                        <div>
                            <label class="text-[9px] font-bold text-blue-400 uppercase tracking-widest ml-1">Date</label>

                            <label class="text-[9px] font-bold text-blue-400 uppercase tracking-widest ml-1">Time</label>
                            <input type="time" id="eventTime" required class="w-full p-2 bg-blue-50/50 border border-blue-100 rounded-xl outline-none mt-1 font-bold">

                    <div>

                        <input type="text" id="location" placeholder="Venue Address" required class="w-full p-4 bg-blue-50/50 border border-blue-100 rounded-2xl outline-none mt-1 font-bold">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Travel Mode</label>
                        <select id="travelBy" class="w-full p-4 bg-blue-50/50 border border-blue-100 rounded-2xl outline-none mt-1 font-bold">

                            <option value="fa-bus" data-name="Bus">🚌 Bus</option>

                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all active:scale-95 uppercase tracking-widest">
                        Save Data

                        <i class="fas fa-history text-indigo-600"></i> Records
                    </h2>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
        authDomain: "sk12-58e9e.firebaseapp.com",
        databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com",
        projectId: "sk12-58e9e",
        appId: "1:470207874652:web:67ba1cf3629b7e5b144899"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('savig_v3_final');

    function setDefaults() {
        document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('eventTime').value = "09:00";
        document.getElementById('submitBtn').innerText = "Save Data";
        document.getElementById('editKey').value = "";
    }
    window.onload = setDefaults;

    function addNameField(value = "") {
        const container = document.getElementById('namesContainer');
        const div = document.createElement('div');
        div.className = "flex gap-1 items-center animate-pop mt-2";
        div.innerHTML = `<input type="text" value="${value}" placeholder="Name" class="person-name flex-1 p-2 text-[15px] bg-blue-50 border border-blue-100 rounded-2xl outline-none font-bold">
                         <button type="button" onclick="this.parentElement.remove()" class="text-red-500 p-1"><i class="fas fa-circle-xmark fa-xl"></i></button>`;
        container.appendChild(div);
    }

    document.getElementById('eventForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const names = Array.from(document.querySelectorAll('.person-name')).map(i => i.value).filter(v => v.trim());
        const travelSelect = document.getElementById('travelBy');
        const selectedOption = travelSelect.options[travelSelect.selectedIndex];
        const editKey = document.getElementById('editKey').value;

 const recordData = {
    purpose: document.getElementById('purpose').value,
    invitedBy: document.getElementById('invitedBy').value, // Add this line
    names,
    date: document.getElementById('eventDate').value,
    time: document.getElementById('eventTime').value,
    location: document.getElementById('location').value,
    travelIcon: selectedOption.value,
    travelName: selectedOption.getAttribute('data-name'),
    timestamp: Date.now()
};

        if(editKey) {
            db.child(editKey).update(recordData).then(() => {
                alert("Updated!");
                resetForm();
            });
        } else {
            db.push(recordData).then(() => resetForm());
        }
    });

    function resetForm() {
        document.getElementById('eventForm').reset();
        setDefaults();
        document.getElementById('namesContainer').innerHTML = `<label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Visitor Names</label>
            <div class="flex gap-2"><input type="text" placeholder="Name" required class="person-name flex-1 p-2 bg-blue-50 border border-blue-100 rounded-2xl outline-none font-bold">
            <button type="button" onclick="addNameField()" class="bg-blue-600 text-white w-10 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-plus"></i></button></div>`;
    }

    let allRecords = [];
    db.on('value', (snap) => {
        allRecords = [];
        const container = document.getElementById('recordsTable');
        container.innerHTML = "";
        snap.forEach((child) => {
            const data = child.val();
            data.key = child.key;
            allRecords.push(data);
            container.prepend(createCard(data));
        });
        document.getElementById('dataCount').innerText = `${allRecords.length} Records`;
    });

    function createCard(data) {
        const card = document.createElement('div');
        card.className = "p-5 bg-white border border-blue-100 rounded-xl shadow-sm hover:shadow-md transition-all animate-pop border-l-4 border-l-blue-600";
        card.innerHTML = `<div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center gap-1 mb-2">
                             <p class="text-[13px] font-black text-indigo-600 uppercase tracking-widest">${data.purpose}</p>
                             <span class="text-[11px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">HOST: ${data.invitedBy || 'N/A'}</span>
                        </div>
                        <div class="flex flex-wrap gap-1 mb-2">${data.names.map(n => `<span class="bg-blue-600 text-white text-[13px] px-3 py-1 rounded-lg font-bold uppercase shadow-sm">${n}</span>`).join('')}</div>
                        <h3 class="data-text-main text-lg">${data.location}</h3>
                        <div class="flex flex-wrap gap-2 text-[11px] data-text-sub uppercase mt-3">
                            <span><i class="far fa-calendar-check text-blue-600 mr-1"></i> ${data.date}</span>
                            <span><i class="far fa-clock text-blue-600 mr-1"></i> ${data.time}</span>
                            <span><i class="fas ${data.travelIcon} text-blue-600 mr-1"></i> ${data.travelName}</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-1 ml-3">
                        <button onclick="editRecord('${data.key}')" class="btn-action btn-edit"><i class="fas fa-pen"></i></button>
                        <button onclick="shareRecord('${data.key}')" class="btn-action btn-share"><i class="fas fa-paper-plane"></i></button>
                        <button onclick="deleteRecord('${data.key}')" class="btn-action btn-delete"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        return card;
    }

    function editRecord(k) {
        const r = allRecords.find(x => x.key === k);
        document.getElementById('editKey').value = k;
        document.getElementById('purpose').value = r.purpose;
        document.getElementById('invitedBy').value = r.invitedBy || "";
        document.getElementById('eventDate').value = r.date;
        document.getElementById('eventTime').value = r.time;
        document.getElementById('location').value = r.location;
        document.getElementById('submitBtn').innerText = "Update Record";
        
        const container = document.getElementById('namesContainer');
        container.innerHTML = '<label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Visitor Names</label>';
        r.names.forEach((name, idx) => {
            if(idx === 0) {
                container.innerHTML += `<div class="flex gap-1"><input type="text" value="${name}" required class="person-name flex-1 p-4 bg-blue-50 border border-blue-100 rounded-2xl outline-none font-bold"><button type="button" onclick="addNameField()" class="bg-blue-600 text-white w-14 rounded-2xl flex items-center justify-center"><i class="fas fa-plus"></i></button></div>`;
            } else {
                addNameField(name);
            }
        });
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function openSearch() { document.getElementById('searchOverlay').style.display = 'flex'; }
    function closeSearch() { document.getElementById('searchOverlay').style.display = 'none'; }
    function filterData(query) {
        const q = query.toLowerCase();
        const res = allRecords.filter(r => 
            (r.names && r.names.some(n => n.toLowerCase().includes(q))) || 
            (r.location && r.location.toLowerCase().includes(q)) ||
            (r.invitedBy && r.invitedBy.toLowerCase().includes(q))
        );
        const target = window.innerWidth < 768 ? document.getElementById('searchResults') : document.getElementById('recordsTable');
        target.innerHTML = "";
        res.forEach(r => target.appendChild(createCard(r)));
    }
    function deleteRecord(k) { if(confirm("Delete?")) db.child(k).remove(); }
    function shareRecord(k) {
        const r = allRecords.find(x => x.key === k);
        const text = `Savig Record: ${r.purpose} hosted by ${r.invitedBy} at ${r.location} on ${r.date}`;
        if(navigator.share) navigator.share({text}); else alert(text);
    }
</script>
</body>
