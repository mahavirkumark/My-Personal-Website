    function calculateNextAge(birthdate) {
        if (!birthdate || birthdate.length !== 10) return null;

        const [birthYear, birthMonth, birthDay] = birthdate.split('-').map(Number);
        const today = new Date();
        const currentYear = today.getFullYear();
        
        if (isNaN(birthYear) || isNaN(birthMonth) || isNaN(birthDay)) return null;

        let age = currentYear - birthYear;
        
        const currentMonth = today.getMonth() + 1; 
        const currentDay = today.getDate();
        
        const bdayPassedThisYear = (currentMonth > birthMonth) || 
                                 (currentMonth === birthMonth && currentDay >= birthDay);
        
        if (bdayPassedThisYear) {
            return age + 1;
        } else {
            return age;
        }
    }

    function updateDateFromAge(dateInput, ageInput) {
        const age = parseInt(ageInput.value);
        const dateInputValue = dateInput.value;
        let monthDay = '';

        if (dateInputValue && dateInputValue.length === 10) {
            monthDay = dateInputValue.substring(5); 
        } else if (dateInputValue && dateInputValue.length === 5 && dateInputValue.includes('-')) {
            monthDay = dateInputValue;
        }

        if (!monthDay || monthDay.length !== 5 || !monthDay.includes('-') || isNaN(age) || age <= 0) {
            if (!dateInput.value) ageInput.value = '';
            return;
        }

        const [birthMonth, birthDay] = monthDay.split('-').map(Number);
        const currentYear = new Date().getFullYear();
        const today = new Date();
        const currentMonth = today.getMonth() + 1; 
        const currentDay = today.getDate();

        let calculatedBirthYear;

        const bdayOccurredThisYear = (currentMonth > birthMonth) ||
                                     (currentMonth === birthMonth && currentDay >= birthDay);

        if (bdayOccurredThisYear) {
            calculatedBirthYear = currentYear - age;
        } else {
            calculatedBirthYear = currentYear - age - 1;
        }

        dateInput.value = `${calculatedBirthYear}-${monthDay.padStart(2, '0')}`;
    }
    
    function calculateAge(birthdate) {
        if (!birthdate || birthdate.length !== 10) return null; 

        const today = new Date();
        const [birthYear, birthMonth, birthDay] = birthdate.split('-').map(Number);
        
        if (isNaN(birthYear) || isNaN(birthMonth) || isNaN(birthDay)) return null;

        let age = today.getFullYear() - birthYear;
        const m = today.getMonth() + 1 - birthMonth; 
        
        if (m < 0 || (m === 0 && today.getDate() < birthDay)) {
            age--;
        }
        return age;
    }

    function getNextBirthdayDate(birthdate) {
        if (!birthdate || birthdate.length !== 10) return null;
        
        const today = new Date();
        const [year, month, day] = birthdate.split('-').map(Number);
        
        let nextBirthday = new Date(today.getFullYear(), month - 1, day);
        
        if (nextBirthday < today) {
            nextBirthday.setFullYear(today.getFullYear() + 1);
        }
        return nextBirthday;
    }
    
    function getUpcomingBirthdays(birthdays) {
        const today = new Date();
        today.setHours(0, 0, 0, 0); 

        const upcoming = Object.values(birthdays).filter(item => {
            if (!item.birthdate || item.birthdate.length !== 10) return false;
            
            const nextBday = getNextBirthdayDate(item.birthdate);
            if (!nextBday) return false;
            
            const diffTime = nextBday.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            return diffDays > 1 && diffDays <= 6;
        }).sort((a, b) => {
            return getNextBirthdayDate(a.birthdate) - getNextBirthdayDate(b.birthdate);
        });
        return upcoming;
    }

    function getTodayAndTomorrowBirthdays(birthdays) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const tomorrow = new Date(today); 
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        const todayBirthdays = Object.values(birthdays).filter(item => {
            if (!item.birthdate || item.birthdate.length !== 10) return false;
            
            const [year, month, day] = item.birthdate.split('-').map(Number);
            
            return today.getMonth() === (month - 1) && today.getDate() === day;
        });
        
        const tomorrowBirthdays = Object.values(birthdays).filter(item => {
            if (!item.birthdate || item.birthdate.length !== 10) return false;

            const [year, month, day] = item.birthdate.split('-').map(Number);

            return tomorrow.getMonth() === (month - 1) && tomorrow.getDate() === day;
        });

        return { todayBirthdays, tomorrowBirthdays }; 

    }

    function renderBirthdayList(listId, items) {
        const list = document.getElementById(listId);
        list.innerHTML = ''; 

        if (items.length === 0) {
            list.innerHTML = `<li class="text-gray-500 text-center col-span-2">${listId === 'today-list' ? 'No birthdays today.' : 'No upcoming birthdays.'}</li>`;
            return;

        items.forEach(item => {

            const nextAge = calculateNextAge(item.birthdate);
            const ageDisplay = nextAge !== null ? `(turning ${nextAge})` : ''; 
            
            const nextBday = getNextBirthdayDate(item.birthdate);
            const dateString = nextBday ? nextBday.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : 'Unknown Date';
            
            li.innerHTML = `

                            <p class="text-xs text-gray-600">${dateString}</p>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(li);
        });
    }
 
function renderAllItems(searchTerm = '') {
    const list = document.getElementById('all-items-list');
    if (!list) return; // Guard clause for the error we saw earlier
    
    list.innerHTML = '';
    let combinedItemsMap = new Map();
    
    // 1. Process Local VCard Contacts
    vcardContacts.forEach(contact => {
        const item = { ...contact, contactId: contact.id, isContact: true, isBirthday: false };
        combinedItemsMap.set(contact.name.toLowerCase(), item);
    });

    // 2. Process Firebase Contacts
    for (const key in allContacts) {
        const contact = allContacts[key];
        const item = { ...contact, contactId: key, isContact: true, isBirthday: false, phone: contact.phone || contact.mobile };
        combinedItemsMap.set(contact.name.toLowerCase(), item);
    }

    // 3. Process Birthdays & Merge
    for (const key in allBirthdays) {
        const birthday = allBirthdays[key];
        const existingItem = combinedItemsMap.get(birthday.name.toLowerCase());
        
        const numbers = [];
        if (birthday.mobile) birthday.mobile.split(',').forEach(num => num.trim() && numbers.push(num.trim()));
        if (existingItem && existingItem.phone) existingItem.phone.split(',').forEach(num => num.trim() && numbers.push(num.trim()));
        
        const uniqueNumbers = [...new Set(numbers)].join(', ');

        if (existingItem) {
            Object.assign(existingItem, {
                birthdate: birthday.birthdate,
                age: birthday.age,
                notes: birthday.notes,
                isBirthday: true,
                birthdayId: key,
                mobile: uniqueNumbers,
                phone: undefined
            });
        } else {
            const item = { ...birthday, birthdayId: key, isContact: false, isBirthday: true, mobile: uniqueNumbers };
            combinedItemsMap.set(birthday.name.toLowerCase(), item);
        }
    }

    // 4. Filter and Sort
    const filteredItems = Array.from(combinedItemsMap.values()).filter(item => 
        (item.name?.toLowerCase().includes(searchTerm)) ||
        (item.phone?.toLowerCase().includes(searchTerm)) ||
        (item.mobile?.toLowerCase().includes(searchTerm))
    );
    
    if (filteredItems.length === 0) {
        list.innerHTML = `<li class="text-center text-gray-500 p-4">No results found.</li>`;
        return;
    }
    
    filteredItems.sort((a, b) => a.name.localeCompare(b.name));

    // 5. Render Items
    filteredItems.forEach(item => {
        const li = document.createElement('li');
        li.className = 'flex items-center justify-between p-4 bg-gray-50 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition';
        li.dataset.name = item.name;
        if (item.contactId) li.dataset.contactId = item.contactId;
        if (item.birthdayId) li.dataset.birthdayId = item.birthdayId;
        if (item.mobile) li.dataset.mobile = item.mobile;

        // Birthday Calculations
        let bdayInfoHtml = '';
        if (item.isBirthday && item.birthdate?.length === 10) {
            const nextAge = calculateNextAge(item.birthdate);
            const nextBday = getNextBirthdayDate(item.birthdate);
            bdayInfoHtml = `
                <p class="text-xs text-gray-500 mt-1"><i class="fas fa-calendar-alt mr-1"></i> DOB: ${item.birthdate}</p>
                <p class="text-sm text-indigo-700 font-bold"><i class="fas fa-birthday-cake mr-1"></i> Turning ${nextAge} on ${nextBday.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</p>
            `;
        }

    function openEditModal(id) {

        const numbers = [];
        if (itemToEdit.mobile) {
            itemToEdit.mobile.split(',').forEach(num => {
                const trimmedNum = num.trim();
                if (trimmedNum) numbers.push(trimmedNum);
            });
        }
        if (itemToEdit.phone) {
            itemToEdit.phone.split(',').forEach(num => {

                if (trimmedNum) numbers.push(trimmedNum);
            });
        }
        
        const consolidatedMobile = [...new Set(numbers)].join(', ');

        editNameInput.value = itemToEdit.name || '';
        
        editMobileInput.value = consolidatedMobile; 
        
        editDateInput.value = itemToEdit.birthdate && itemToEdit.birthdate.length === 10 ? itemToEdit.birthdate : '';

    function deleteContact(id) {

                });

    function shareBirthday(birthday) {
        let shareText = `Name: ${birthday.name}!`;
        
        if(birthday.birthdate && birthday.birthdate.length === 10) {
            shareText += `\nBirth Date: ${new Date(birthday.birthdate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
        }
        
        if (birthday.age) {
            shareText += `\nThey are ${birthday.age} years old.`;
        }
        
        if (navigator.share) {
            navigator.share({
                title: `Birthday Reminder: ${birthday.name}`,
                text: shareText
            }).catch(error => console.error('Error sharing:', error));
        } else {
            alert('Birthday details (copied to clipboard if supported):\n\n' + shareText);
            navigator.clipboard.writeText(shareText).catch(err => console.error('Could not copy text: ', err));

    function shareContact(contact) {
        let shareText = `Name: ${contact.name}`;
        if(contact.mobile) {
            shareText += `\nMobile No: ${contact.mobile}`;
        }

        if (navigator.share) {
            navigator.share({

            }).catch(error => console.error('Error sharing:', error));
        } else {

            navigator.clipboard.writeText(shareText).catch(err => console.error('Could not copy text: ', err));

    }

    // --- Data Retrieval and Display ---
    function initializeData() {
        if (currentUserId) {
            const birthdaysRef = database.ref(`users/${currentUserId}/birthdays`);
            
            birthdaysRef.once('value').then((snapshot) => {
                allBirthdays = snapshot.val() || {};
                renderDashboardLists();
                renderAllItems(searchInput.value);
                
                if (!initialLoadComplete) {
                    checkAndNotify(); 
                    initialLoadComplete = true; 
                }
            }).catch(error => {
                console.error("Error fetching initial birthday data:", error);
            });
            
            birthdaysRef.on('value', (snapshot) => {
                allBirthdays = snapshot.val() || {};
                renderDashboardLists();
                renderAllItems(searchInput.value); 
            });
            
            function renderDashboardLists() {
                const { todayBirthdays } = getTodayAndTomorrowBirthdays(allBirthdays);
                const upcomingBirthdays = getUpcomingBirthdays(allBirthdays);
                document.getElementById('today-list').innerHTML = ''; 
                document.getElementById('upcoming-birthdays-list').innerHTML = '';
                renderBirthdayList('today-list', todayBirthdays);
                renderBirthdayList('upcoming-birthdays-list', upcomingBirthdays);
            }
            
            const contactsRef = database.ref(`users/${currentUserId}/contacts`);
            contactsRef.on('value', (snapshot) => {
                allContacts = snapshot.val() || {};
                renderAllItems(searchInput.value);
            });
        }
    }

    // --- Notification Functions ---
    function requestNotificationPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    console.log('Notification permission granted.');
                } else {
                    console.warn('Notification permission denied.');
                }
            });
        } else {
            console.warn('This browser does not support notifications.');
        }
    }

    const LAST_NOTIFICATION_KEY = 'birthday_notification_timestamp';

    function checkAndNotify() {
        const today = new Date();
        today.setHours(0, 0, 0, 0); 
        
        const lastNotifiedTime = localStorage.getItem(LAST_NOTIFICATION_KEY);
        const msInDay = 24 * 60 * 60 * 1000;
        
        if (lastNotifiedTime) {
            const timeElapsed = today.getTime() - parseInt(lastNotifiedTime);
            if (timeElapsed < msInDay) {
                console.log("Birthday notification already sent today. Skipping.");
                return;
            }
        }

        if (currentUserId && Notification.permission === 'granted') {
            
            const birthdaysToday = Object.values(allBirthdays).filter(bday => {
                if (!bday.birthdate || bday.birthdate.length !== 10) return false;
                
                const [year, month, day] = bday.birthdate.split('-').map(Number);
                
                return (today.getMonth() + 1) === month && today.getDate() === day;
            });

            if (birthdaysToday.length > 0) {
                let notificationTitle = "Happy Birthday! 🎉";
                let notificationBody = "Here are today's birthdays:\n";

                birthdaysToday.forEach(bday => {
                    const ageTurning = bday.birthdate && bday.birthdate.length === 10 ? calculateNextAge(bday.birthdate) : null;
                    const ageDisplay = ageTurning !== null ? ` (turning ${ageTurning})` : '';
                    
                    notificationBody += `- ${bday.name}${ageDisplay}\n`;
                });
                
                if (notificationBody.trim() !== "Here are today's birthdays:") {
                    new Notification(notificationTitle, {
                        body: notificationBody,
                        icon: 'https://via.placeholder.com/40' 
                    });
                    
                    localStorage.setItem(LAST_NOTIFICATION_KEY, today.getTime());
                }
            }
        }
    }
        
    // --- Auth State Listener ---
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUserId = user.uid;
            document.getElementById('userName').textContent = user.displayName || 'Guest';

            initializeData();

        } else {

        auth.signOut().then(() => {
            window.location.href = 'index.html';
        }).catch(error => {
            console.error('Sign out error', error);
        });
    }
