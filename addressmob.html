<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>Address Directory - Smart Location Saver</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc&libraries=geometry,places&callback=initGeocoder" defer></script>

    <style>
        /* RESET & BASE - ALL ORIGINAL COLORS PRESERVED */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-bold: #000000;
            --text-search: #000000;
            --placeholder-color: #9ca3af;
            --border: #e5e7eb;
            --nav-bg: #ffffff;
            --nav-text: #000000;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
        }
        
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #cbd5e1;
            --text-bold: #f8fafc;
            --text-search: #f8fafc;
            --placeholder-color: #94a3b8;
            --border: #334155;
            --nav-bg: #0f172a;
            --nav-text: #ffffff;
            --input-bg: #334155;
            --input-border: #475569;
        }
        
        body { 
            background-color: var(--bg-body) !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s;
            padding-bottom: 80px;
        }
        
        h1, h2, h3, h4, .font-bold, .font-semibold, .text-gray-900, .text-gray-800 { 
            color: var(--text-bold) !important; 
        }
        p, li, span, .text-gray-700, .text-gray-600 { 
            color: var(--text-main) !important; 
        }
        .bg-white, header, aside, main, .bg-gray-100 { 
            background-color: var(--bg-card) !important;
            border-color: var(--border) !important;
        }
        
        /* SEARCH INPUT STYLES - REDUCED WIDTH BY 30PX */
        .search-container {
            max-width: calc(100% - 30px);
            margin-left: auto;
            margin-right: auto;
        }
        
        #searchInput {
            border-radius: 9999px !important;
            border: 2px solid transparent;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 16px !important;
            background-color: var(--input-bg) !important;
            color: var(--text-search) !important;
        }
        #searchInput::placeholder {
            color: var(--placeholder-color) !important;
            opacity: 1;
        }
        
        input::placeholder, textarea::placeholder {
            color: var(--placeholder-color) !important;
            opacity: 1;
        }
        
        input, textarea {
            background-color: var(--input-bg) !important;
            color: var(--text-search) !important;
            border-color: var(--input-border) !important;
        }
        
        /* MAIN CONTAINER WIDTH REDUCED BY 30PX FOR ADDRESS LIST */
        .address-list-container {
            width: calc(100% - 30px);
            margin-left: auto;
            margin-right: auto;
        }
        
        /* 4 BUTTONS IN ONE ROW - FIXED */
        .button-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .button-row button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 4px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .button-row button i {
            font-size: 14px;
        }
        
        /* Responsive button row for very small screens */
        @media (max-width: 480px) {
            .button-row button {
                font-size: 13px;
                padding: 6px 2px;
            }
            .button-row button i {
                font-size: 12px;
            }
            .button-row {
                gap: 6px;
            }
        }
        
        /* FIXED MOBILE VIEW - NO OVERLAPPING */
        @media (max-width: 767px) {
            /* Fix grid overlap on mobile */
            .grid {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }
            
            .left-container, .right-container {
                width: 100% !important;
                margin-left: 0 !important;
                margin-right: 0 !important;
            }
            
            .address-list-container {
                width: 100% !important;
            }
            
            .search-container {
                max-width: 100% !important;
                padding-left: 1rem;
                padding-right: 1rem;
            }
            
            /* Fix form overlap issues */
            #addressFormContent {
                width: 100%;
                overflow-x: hidden;
            }
            
            /* Fix header spacing */
            .main-header-section {
                padding-top: 1rem;
                padding-left: 1rem;
                padding-right: 1rem;
            }
            
            /* Fix bottom nav spacing */
            #universal-bottom-nav {
                height: 60px;
            }
            
            /* Theme button position fix */
            #theme-toggle-btn {
                bottom: 75px;
                right: 15px;
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
            }
            
            /* Fix form toggle icon visibility */
            .left-container .flex {
                cursor: pointer;
            }
        }
        
        /* RESPONSIVE MOBILE SEARCH OVERLAY - FULLY RESPONSIVE */
        @media (max-width: 767px) {
            body.search-active { overflow: hidden; }
            body.search-active .left-container, 
            body.search-active .main-header-section,
            body.search-active footer,
            body.search-active #universal-bottom-nav,
            body.search-active #theme-toggle-btn,
            body.search-active h1,
            body.search-active .right-container h2 { 
                display: none !important; 
            }
            body.search-active #searchWrapper {
                position: fixed;
                top: 0; left: 0; right: 0;
                z-index: 80;
                background: var(--bg-body);
                padding: 12px;
                border-bottom: 1px solid var(--border);
            }
            body.search-active .right-container {
                position: fixed;
                top: 70px; left: 0; right: 0;
                height: calc(100vh - 70px);
                z-index: 90;
                overflow-y: auto;
                background: var(--bg-body);
                padding: 16px;
                width: 100% !important;
            }
            body.search-active .right-container h2 {
                display: none !important;
            }
            body.search-active .address-list-container {
                width: 100% !important;
            }
        }
        
        /* DESKTOP STICKY SIDEBAR - RESPONSIVE */
        @media (min-width: 768px) {
            .left-container { 
                position: sticky; 
                top: 6rem; 
                align-self: start;
                max-height: calc(100vh - 8rem);
                overflow-y: auto;
            }
            
            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
            
            .address-list-container {
                width: calc(100% - 30px) !important;
            }
        }
        
        /* RESPONSIVE GRID ADJUSTMENTS */
        @media (max-width: 768px) {
            .max-w-7xl {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .p-5 {
                padding: 1.25rem;
            }
        }
        
        @media (min-width: 768px) and (max-width: 1024px) {
            .max-w-7xl {
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }
        
        #backBtn {
            display: none !important;
        }
        body.search-active #backBtn {
            display: flex !important;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        .address-item { 
            transition: all 0.2s ease; 
        }
        
        /* BOTTOM NAVIGATION - RESPONSIVE */
        #universal-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: var(--nav-bg);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            z-index: 999999;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--nav-text) !important;
            text-decoration: none !important;
            cursor: pointer;
        }
        .nav-link i { 
            font-size: 22px; 
            margin-bottom: 3px;
            color: var(--nav-text) !important;
        }
        .nav-link div { 
            font-size: 10px; 
            font-weight: 800;
            color: var(--nav-text) !important;
        }
     
        
        /* THEME TOGGLE - ORIGINAL */
        #theme-toggle-btn {
            position: fixed;
            bottom: 85px;
            right: 20px;
            z-index: 10000;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        #theme-toggle-btn:active { transform: scale(0.95); }
        
        /* COLLAPSIBLE FORM ON MOBILE - RESPONSIVE */
        @media (max-width: 767px) {
            #addressFormContent.hidden {
                display: none;
            }
            #addressFormContent:not(.hidden) {
                display: block;
            }
            .left-container .flex {
                cursor: pointer;
            }
        }
        
        /* TOUCH-FRIENDLY BUTTONS */
        button, .nav-link, .address-item button {
            cursor: pointer;
            touch-action: manipulation;
        }
        
        /* RESPONSIVE TEXT SIZES */
        @media (max-width: 640px) {
            h1 {
                font-size: 1.5rem;
            }
            .text-xl {
                font-size: 1.125rem;
            }
        }
        
        /* SCROLLBAR STYLING */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
        
        .nav-spacer { height: 0px !important; display: none; }
        
        /* Fix for overlapping elements */
        .max-w-7xl {
            overflow-x: hidden;
        }
        
        .right-container {
            overflow-x: hidden;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="main-header-section pt-4 px-4">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight">
                Address <span class="text-indigo-600">Directory</span>
            </h1>
        </div>
    </div>

    <!-- SEARCH BAR WITH REDUCED WIDTH BY 30PX -->
    <div class="search-container px-4 pt-2 mt-4" style="max-width: calc(100% - 30px); margin: 0 auto;">
        <div id="searchWrapper" class="relative flex items-center">
            <button id="backBtn" onclick="exitSearchFocus()" class="hidden mr-2 text-2xl p-2 rounded-full" style="color: var(--text-search); background: var(--bg-card);">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="relative flex-grow">
                <div class="absolute left-5 top-1/2 -translate-y-1/2" style="color: var(--placeholder-color);">
                    <i class="fas fa-search"></i>
                </div>
                <input type="text" id="searchInput" 
                       placeholder="Search by name, landmark, or city..." 
                       class="w-full pl-10 pr-10 py-3 shadow-2xl border-none focus:ring-4 focus:ring-indigo-100 outline-none text-lg"
                       style="border-radius: 9999px; background-color: var(--input-bg); color: var(--text-search);" 
                       oninput="handleSearchInput(this)" 
                       onfocus="toggleMobileSearchFocus(true)">
                <button onclick="startVoiceSearch()" id="micBtn" class="absolute right-6 top-1/2 -translate-y-1/2 text-indigo-600">
                    <i class="fas fa-microphone text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6 md:px-6 md:py-8 grid md:grid-cols-2 gap-8">
        <!-- LEFT PANEL - SAVE ADDRESS FORM (ALL ORIGINAL BUTTON COLORS) -->
        <div class="p-5 rounded-xl shadow-lg h-fit md:sticky md:top-20 left-container" style="background-color: var(--bg-card);">
            <div class="flex justify-between items-center cursor-pointer border-b pb-2 md:pointer-events-none" style="border-color: var(--border);" onclick="toggleFormMobile()">
                <h2 class="text-xl font-bold text-indigo-700">➕ Save New Address</h2>
                <i id="formToggleIcon" class="fas fa-chevron-down md:hidden text-indigo-700"></i>
            </div>
            
            <div id="addressFormContent" class="md:block hidden space-y-4 mt-4">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--text-main);">Place Name (e.g., Home, Office)</label>
                    <input type="text" id="placeInput" placeholder="Enter place name..." 
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition"
                           style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--text-main);">Landmark / Details</label>
                    <textarea id="landmarkInput" placeholder="Enter building number, street, or full address details..." rows="2"
                              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition resize-y"
                              style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--text-main);">Google Map Location (Optional)</label>
                    <input type="url" id="mapInput" placeholder="Paste Google Maps URL or address here..." 
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition mb-2"
                           style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);" />
                    <a href="https://www.google.com/maps" target="_blank" rel="noopener noreferrer"
                       class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg transition font-medium text-sm shadow-sm"
                       style="background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border);">
                        <img src="https://www.gstatic.com/images/branding/product/1x/maps_96dp.png" alt="Google Maps" class="w-5 h-5">
                        Find Location on Google Maps
                    </a>
                </div>
                <!-- ORIGINAL GPS BUTTON COLOR (green-600) -->
                <button type="button" onclick="fetchGPS()" id="gpsBtn" class="w-full flex items-center justify-center gap-2 bg-green-600 text-white py-2.5 rounded-lg hover:bg-green-700 transition font-medium text-sm shadow-md">
                    <i class="fas fa-location-crosshairs"></i>
                    Get Accurate GPS Location
                </button>
                <!-- ORIGINAL SAVE BUTTON COLOR (indigo-600) -->
                <button id="saveAddressBtn" onclick="saveAddress()" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 transition flex items-center justify-center shadow-md">
                    <i class="fas fa-save mr-2"></i> Save Address
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL - ADDRESSES LIST WITH REDUCED WIDTH BY 30PX -->
        <div class="right-container address-list-container" style="width: calc(100% - 30px); margin-left: auto; margin-right: auto;">
            <h2 class="text-xl font-bold mb-2 text-indigo-700">🏠 Your Saved Addresses</h2>
            <div id="addressList" class="space-y-4">
                <div id="loadingIndicator" class="text-center p-10" style="color: var(--text-main);">
                    <i class="fas fa-sync fa-2x spinner text-indigo-500 mb-3"></i>
                    <div class="text-center p-10" style="color: var(--placeholder-color);">
                        <i class="fas fa-map-marked-alt fa-3x mb-3"></i>
                        <p>Your saved locations will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION - ORIGINAL -->
    <nav id="universal-bottom-nav">
        <a href="homemob.html" class="nav-link flex flex-col items-center">
            <i class="fa-solid fa-house"></i>
            <div>Home</div>
        </a>
        <a href="addressmob.html" class="nav-link flex flex-col items-center active">
            <i class="fa-solid fa-location-dot"></i>
            <div>Address</div>
        </a>
        <a href="passwordmob.html" class="nav-link flex flex-col items-center">
            <i class="fa-solid fa-key"></i>
            <div>Password</div>
        </a>
        <a href="contact.html" class="nav-link flex flex-col items-center">
            <i class="fa-solid fa-envelope"></i>
            <div>Contact</div>
        </a>
        <a href="calendermob.html" class="nav-link flex flex-col items-center">
            <i class="fas fa-calendar-alt"></i>
            <div>Calendar</div>
        </a>
    </nav>

    <button id="theme-toggle-btn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <script>
        // ==================== SECURITY & SANITIZATION ====================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
