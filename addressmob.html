<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Address Directory - Smart Location Saver</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Maps API - IMPORTANT: Restrict this key in Google Cloud Console -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc&libraries=geometry,places&callback=initGeocoder" defer></script>

    <style>
        /* Theme System */
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-bold: #000000;
            --text-search: #000000;
            --placeholder-color: #9ca3af;
            --border: #e5e7eb;
            --nav-bg: #ffffff;
            --nav-text: #000000;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #cbd5e1;
            --text-bold: #f8fafc;
            --text-search: #f8fafc;
            --placeholder-color: #94a3b8;
            --border: #334155;
            --nav-bg: #0f172a;
            --nav-text: #ffffff;
            --input-bg: #334155;
            --input-border: #475569;
        }
        
        body { 
            background-color: var(--bg-body) !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s;
            padding-bottom: 80px;
        }
        
        h1, h2, h3, h4, .font-bold, .font-semibold, .text-gray-900, .text-gray-800 { 
            color: var(--text-bold) !important; 
        }
        p, li, span, .text-gray-700, .text-gray-600 { 
            color: var(--text-main) !important; 
        }
        .bg-white, header, aside, main, .bg-gray-100 { 
            background-color: var(--bg-card) !important;
            border-color: var(--border) !important;
        }
        
        /* Search Input - Text color based on theme */
        #searchInput {
            border-radius: 9999px !important;
            border: 2px solid transparent;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 16px !important;
            background-color: var(--input-bg) !important;
            color: var(--text-search) !important;
        }
        #searchInput::placeholder {
            color: var(--placeholder-color) !important;
            opacity: 1;
        }
        #searchInput:focus {
            border-color: #6366f1;
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1);
        }
        
        /* All input fields placeholder visibility */
        input::placeholder, textarea::placeholder {
            color: var(--placeholder-color) !important;
            opacity: 1;
        }
        
        input, textarea {
            background-color: var(--input-bg) !important;
            color: var(--text-search) !important;
            border-color: var(--input-border) !important;
        }
        
        /* Mobile Search Active - Hide everything except search and results */
        @media (max-width: 767px) {
            body.search-active { overflow: hidden; }
            body.search-active .left-container, 
            body.search-active .main-header-section,
            body.search-active .page-header-box,
            body.search-active footer,
            body.search-active #universal-bottom-nav,
            body.search-active #theme-toggle-btn,
            body.search-active h1,
            body.search-active .right-container h2 { 
                display: none !important; 
            }
            body.search-active #searchWrapper {
                position: fixed;
                top: 0; left: 0; right: 0;
                z-index: 100;
                background: var(--bg-body);
                padding: 12px;
                border-bottom: 1px solid var(--border);
            }
            body.search-active .right-container {
                position: fixed;
                top: 80px; left: 0; right: 0;
                height: calc(100vh - 80px);
                z-index: 90;
                overflow-y: auto;
                background: var(--bg-body);
                padding: 16px;
            }
            body.search-active .right-container h2 {
                display: none !important;
            }
            body.search-active .address-list-container {
                margin-top: 0;
            }
        }
        
        @media (min-width: 768px) {
            .left-container { position: sticky; top: 6rem; }
        }
        
        /* Back Button */
        #backBtn {
            display: none !important;
        }
        body.search-active #backBtn {
            display: flex !important;
        }
        
        /* Spinner Animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        /* Address Items */
        .address-item { transition: all 0.2s ease; }
        
        /* Bottom Navigation */
        #universal-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: var(--nav-bg);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            z-index: 999999;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--nav-text) !important;
            text-decoration: none !important;
            cursor: pointer;
        }
        .nav-link i { 
            font-size: 22px; 
            margin-bottom: 3px;
            color: var(--nav-text) !important;
        }
        .nav-link div { 
            font-size: 10px; 
            font-weight: 800;
            color: var(--nav-text) !important;
        }
        .nav-link.active i, .nav-link.active div {
            color: #6366f1 !important;
        }
        
        /* Theme Toggle Button */
        #theme-toggle-btn {
            position: fixed;
            bottom: 85px;
            right: 20px;
            z-index: 10000;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        #theme-toggle-btn:active { transform: scale(0.95); }
        
        .nav-spacer { height: 0px !important; display: none; }
        
        /* Hide "Your Saved Addresses" title on mobile when searching */
        .right-container h2 {
            transition: display 0.3s;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Header -->
    <div class="main-header-section pt-4 px-4">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight">
                Address <span class="text-indigo-600">Directory</span>
            </h1>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="max-w-4xl mx-auto px-4 mt-4">
        <div id="searchWrapper" class="relative flex items-center w-full">
            <button id="backBtn" onclick="exitSearchFocus()" class="hidden mr-2 text-2xl p-2 rounded-full" style="color: var(--text-search); background: var(--bg-card);">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="relative flex-grow">
                <div class="absolute left-6 top-1/2 -translate-y-1/2" style="color: var(--placeholder-color);">
                    <i class="fas fa-search"></i>
                </div>
                <input type="text" id="searchInput" 
                       placeholder="Search by name, landmark, or city..." 
                       class="w-full pl-14 pr-14 py-4 shadow-2xl border-none focus:ring-4 focus:ring-indigo-100 outline-none text-lg"
                       style="border-radius: 9999px; background-color: var(--input-bg); color: var(--text-search);" 
                       oninput="handleSearchInput(this)" 
                       onfocus="toggleMobileSearchFocus(true)">
                <button onclick="startVoiceSearch()" id="micBtn" class="absolute right-6 top-1/2 -translate-y-1/2 text-indigo-600">
                    <i class="fas fa-microphone text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-6 md:px-6 md:py-8 grid md:grid-cols-2 gap-8">
        <!-- Left Panel - Add Address -->
        <div class="p-5 rounded-xl shadow-lg h-fit md:sticky md:top-20 left-container" style="background-color: var(--bg-card);">
            <div class="flex justify-between items-center cursor-pointer border-b pb-2" style="border-color: var(--border);" onclick="document.getElementById('addressFormContent').classList.toggle('hidden')">
                <h2 class="text-xl font-bold text-indigo-700">➕ Save New Address</h2>
                <i class="fas fa-chevron-down md:hidden text-indigo-700"></i>
            </div>
            
            <div id="addressFormContent" class="hidden md:block space-y-4 mt-4">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--text-main);">Place Name (e.g., Home, Office)</label>
                    <input type="text" id="placeInput" placeholder="Enter place name..." 
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition"
                           style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);" />
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--text-main);">Landmark / Details</label>
                    <textarea id="landmarkInput" placeholder="Enter building number, street, or full address details..." rows="2"
                              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition resize-y"
                              style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--text-main);">Google Map Location (Optional)</label>
                    <input type="url" id="mapInput" placeholder="Paste Google Maps URL or address here..." 
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition mb-2"
                           style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);" />
                    <a href="https://www.google.com/maps" target="_blank" rel="noopener noreferrer"
                       class="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg transition font-medium text-sm shadow-sm"
                       style="background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border);">
                        <img src="https://www.gstatic.com/images/branding/product/1x/maps_96dp.png" alt="Google Maps" class="w-5 h-5">
                        Find Location on Google Maps
                    </a>
                </div>
                <button type="button" onclick="fetchGPS()" id="gpsBtn" class="w-full flex items-center justify-center gap-2 bg-green-600 text-white py-2.5 rounded-lg hover:bg-green-700 transition font-medium text-sm shadow-md">
                    <i class="fas fa-location-crosshairs"></i>
                    Get Accurate GPS Location
                </button>
                <button id="saveAddressBtn" onclick="saveAddress()" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 transition flex items-center justify-center shadow-md">
                    <i class="fas fa-save mr-2"></i> Save Address
                </button>
            </div>
        </div>

        <!-- Right Panel - Address List -->
        <div class="right-container">
            <h2 class="text-xl font-bold mb-4 text-indigo-700">🏠 Your Saved Addresses</h2>
            <div id="addressList" class="space-y-4">
                <div id="loadingIndicator" class="text-center p-10" style="color: var(--text-main);">
                    <i class="fas fa-sync fa-2x spinner text-indigo-500 mb-3"></i>
                    <div class="text-center p-10" style="color: var(--placeholder-color);">
                        <i class="fas fa-map-marked-alt fa-3x mb-3"></i>
                        <p>Your saved locations will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="universal-bottom-nav">
        <a href="homemob.html" class="nav-link flex flex-col items-center">
            <i class="fa-solid fa-house"></i>
            <div>Home</div>
        </a>
        <a href="addressmob.html" class="nav-link flex flex-col items-center active">
            <i class="fa-solid fa-location-dot"></i>
            <div>Address</div>
        </a>
        <a href="passwordmob.html" class="nav-link flex flex-col items-center">
            <i class="fa-solid fa-key"></i>
            <div>Password</div>
        </a>
        <a href="contact.html" class="nav-link flex flex-col items-center">
            <i class="fa-solid fa-envelope"></i>
            <div>Contact</div>
        </a>
        <a href="calendermob.html" class="nav-link flex flex-col items-center">
            <i class="fas fa-calendar-alt"></i>
            <div>Calendar</div>
        </a>
    </nav>

    <!-- Theme Toggle Button -->
    <button id="theme-toggle-btn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <div class="nav-spacer"></div>

    <script>
        // ==================== SECURITY & SANITIZATION ====================
        
        // XSS Protection: Escape HTML content
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // XSS Protection: Escape for HTML attributes
        function escapeAttribute(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
        
        // XSS Protection: Escape for JavaScript strings
        function escapeJsString(str) {
            if (!str) return '';
            return String(str)
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/"/g, '\\"')
                .replace(/\n/g, '\\n')
                .replace(/\r/g, '\\r');
        }

        // ==================== THEME MANAGEMENT ====================
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
            applyThemeToDynamicElements(savedTheme);
        })();

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
            applyThemeToDynamicElements(newTheme);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle-btn');
            if (btn) {
                btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
        }
        
        function applyThemeToDynamicElements(theme) {
            const isDark = theme === 'dark';
            document.body.style.backgroundColor = isDark ? '#0f172a' : '#f8fafc';
        }

        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
            authDomain: "sk12-58e9e.firebaseapp.com",
            databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com",
            projectId: "sk12-58e9e",
            storageBucket: "sk12-58e9e.firebasestorage.app",
            messagingSenderId: "470207874652",
            appId: "1:470207874652:web:67ba1cf3629b7e5b144899"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        // ==================== GLOBAL VARIABLES ====================
        let allAddresses = [];
        let geocoder = null;
        let databaseRef = null;

        // ==================== INIT GEOCODER ====================
        window.initGeocoder = function() {
            if (window.google && google.maps) {
                geocoder = new google.maps.Geocoder();
                console.log("Geocoder ready");
            }
        };

        setTimeout(function() {
            if (!geocoder && window.google && google.maps) {
                geocoder = new google.maps.Geocoder();
            }
        }, 1000);

        // ==================== HELPER FUNCTIONS ====================
        function capitalizeWords(str) {
            if (!str) return '';
            return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        function extractCoordinatesFromUrl(url) {
            if (!url) return null;
            let match = url.match(/[?&]q=([-\d.]+),([-\d.]+)/);
            if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            match = url.match(/@([-\d.]+),([-\d.]+)/);
            if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            match = url.match(/q=([-\d.]+)%2C([-\d.]+)/);
            if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            return null;
        }

        async function geocodeAddressToCoords(addressString) {
            if (!addressString || !geocoder) return null;
            if (addressString.includes("maps.app.goo.gl") || addressString.includes("goo.gl/maps")) {
                return null;
            }
            let coords = extractCoordinatesFromUrl(addressString);
            if (coords) return coords;
            
            try {
                const result = await new Promise((resolve, reject) => {
                    geocoder.geocode({ address: addressString }, (results, status) => {
                        if (status === "OK" && results.length) resolve(results[0].geometry.location);
                        else reject(status);
                    });
                });
                return { lat: result.lat(), lng: result.lng() };
            } catch(err) {
                console.warn("Geocoding failed:", err);
                return null;
            }
        }

        // ==================== NAVIGATION FUNCTION ====================
        function navigateToLocation(lat, lng, mapLink, placeName) {
            let url = null;
            if (lat !== null && lat !== undefined && lng !== null && lng !== undefined) {
                url = "https://www.google.com/maps?q=" + lat + "," + lng;
            } else if (mapLink && mapLink.trim()) {
                url = mapLink.trim();
            } else if (placeName) {
                url = "https://www.google.com/maps?q=" + encodeURIComponent(placeName);
            }
            
            if (url) {
                window.open(url, "_blank", "noopener,noreferrer");
            } else {
                alert("No navigation data available");
            }
        }

        // ==================== SAVE ADDRESS ====================
        async function saveAddress() {
            const user = firebase.auth().currentUser;
            if (!user || !user.uid) {
                alert("Please login again.");
                return;
            }
            
            const place = document.getElementById("placeInput").value.trim();
            const landmark = document.getElementById("landmarkInput").value.trim();
            const mapLink = document.getElementById("mapInput").value.trim();
            
            if (!place || !landmark) {
                alert("Please fill both Place Name and Details.");
                return;
            }
            
            let finalLat = null, finalLng = null;
            const coordinates = extractCoordinatesFromUrl(mapLink);
            
            if (coordinates) {
                finalLat = coordinates.lat;
                finalLng = coordinates.lng;
            } else if (mapLink && !mapLink.includes("goo.gl")) {
                const coords = await geocodeAddressToCoords(mapLink);
                if (coords) {
                    finalLat = coords.lat;
                    finalLng = coords.lng;
                }
            }
            
            const newRef = firebase.database().ref("addresses/" + user.uid).push();
            const addressObj = {
                id: newRef.key,
                place: capitalizeWords(place),
                landmark: capitalizeWords(landmark),
                mapLink: mapLink,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            if (finalLat !== null) addressObj.lat = finalLat;
            if (finalLng !== null) addressObj.lng = finalLng;
            
            newRef.set(addressObj).then(() => {
                document.getElementById("placeInput").value = "";
                document.getElementById("landmarkInput").value = "";
                document.getElementById("mapInput").value = "";
                alert("Address saved successfully!");
            }).catch(error => {
                console.error("Error:", error);
                alert("Failed to save address.");
            });
        }

        // ==================== LOAD ADDRESSES ====================
        function loadAddresses(uid) {
            if (databaseRef) {
                databaseRef.off();
            }
            databaseRef = firebase.database().ref("addresses/" + uid);
            databaseRef.on("value", (snapshot) => {
                allAddresses = [];
                snapshot.forEach((child) => {
                    allAddresses.push(child.val());
                });
                filterAddresses();
            });
        }

        // ==================== DISPLAY ADDRESSES ====================
        function displayFilteredAddresses(dataList) {
            const addressListEl = document.getElementById("addressList");
            if (!addressListEl) return;
            addressListEl.innerHTML = "";
            
            if (dataList.length === 0) {
                addressListEl.innerHTML = '<div class="text-center p-8 rounded-xl shadow" style="color: var(--text-main); background-color: var(--bg-card);">📍 No addresses found. Add your first location!</div>';
                return;
            }
            
            const uid = firebase.auth().currentUser?.uid;
            
            dataList.forEach(data => {
                const hasCoords = (data.lat !== null && data.lat !== undefined && data.lng !== null && data.lng !== undefined);
                const div = document.createElement("div");
                div.className = "address-item p-4 rounded-xl shadow-md border mb-3";
                div.style.backgroundColor = "var(--bg-card)";
                div.style.borderColor = "var(--border)";
                
                let navButton = '';
                if (hasCoords) {
                    navButton = `<button onclick="navigateToLocation(${data.lat}, ${data.lng}, null, null)" class="bg-indigo-500 text-white px-3 py-1.5 rounded-full hover:bg-indigo-600 transition text-sm flex items-center shadow-sm">
                                    <i class="fas fa-location-arrow mr-1"></i> Start Navigation
                                </button>`;
                } else if (data.mapLink) {
                    navButton = `<button onclick="navigateToLocation(null, null, '${escapeJsString(data.mapLink)}', null)" class="bg-indigo-500 text-white px-3 py-1.5 rounded-full hover:bg-indigo-600 transition text-sm flex items-center shadow-sm">
                                    <i class="fas fa-location-arrow mr-1"></i> Start Navigation
                                </button>`;
                } else {
                    navButton = `<button onclick="navigateToLocation(null, null, null, '${escapeJsString(data.place)}')" class="bg-indigo-500 text-white px-3 py-1.5 rounded-full hover:bg-indigo-600 transition text-sm flex items-center shadow-sm">
                                    <i class="fas fa-location-arrow mr-1"></i> Start Navigation
                                </button>`;
                }
                
                div.innerHTML = `
                    <div id="display-view-${escapeAttribute(data.id)}">
                        <div>
                            <p class="text-lg font-bold" style="color: var(--text-bold);">${escapeHtml(data.place)}</p>
                            <p class="text-sm mt-1" style="color: var(--text-main);">${escapeHtml(data.landmark)}</p>
                            ${data.mapLink ? `<p class="text-xs truncate mt-1" style="color: #3b82f6;"><i class="fas fa-link"></i> Map link saved</p>` : ''}
                            ${hasCoords ? `<p class="text-xs mt-1" style="color: var(--placeholder-color);"><i class="fas fa-map-pin"></i> GPS: ${data.lat.toFixed(4)}, ${data.lng.toFixed(4)}</p>` : ''}
                        </div>
                        <div class="flex flex-wrap justify-end gap-2 mt-3 border-t pt-3" style="border-color: var(--border);">
                            ${navButton}
                            <button class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-sm flex items-center" 
                                    onclick="shareAddress('${escapeJsString(data.place)}', '${escapeJsString(data.landmark)}', '${escapeJsString(data.mapLink || '')}', 'whatsapp')">
                                <i class="fab fa-whatsapp mr-1"></i> WhatsApp
                            </button>
                            <button class="bg-blue-500 text-white px-3 py-1.5 rounded-full text-sm flex items-center" 
                                    onclick="shareAddress('${escapeJsString(data.place)}', '${escapeJsString(data.landmark)}', '${escapeJsString(data.mapLink || '')}', 'system')">
                                <i class="fas fa-share-alt mr-1"></i> Share
                            </button>
                            <button class="bg-yellow-500 text-white px-3 py-1.5 rounded-full text-sm flex items-center" 
                                    onclick="toggleEditForm('${escapeAttribute(data.id)}')">
                                <i class="fas fa-edit mr-1"></i> Edit
                            </button>
                            <button class="bg-red-500 text-white px-3 py-1.5 rounded-full text-sm flex items-center" 
                                    onclick="deleteAddress('${escapeAttribute(uid)}', '${escapeAttribute(data.id)}')">
                                <i class="fas fa-trash-alt mr-1"></i> Delete
                            </button>
                        </div>
                    </div>
                    <div id="edit-form-${escapeAttribute(data.id)}" class="hidden space-y-3 pt-3 border-t mt-3" style="border-color: var(--border);">
                        <h4 class="font-bold" style="color: var(--text-bold);">Editing: ${escapeHtml(data.place)}</h4>
                        <input type="text" id="edit-place-${escapeAttribute(data.id)}" value="${escapeAttribute(data.place)}" class="w-full p-2 border rounded-lg text-sm" style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);" />
                        <textarea id="edit-landmark-${escapeAttribute(data.id)}" rows="2" class="w-full p-2 border rounded-lg text-sm" style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);">${escapeHtml(data.landmark)}</textarea>
                        <input type="url" id="edit-map-${escapeAttribute(data.id)}" value="${escapeAttribute(data.mapLink || '')}" class="w-full p-2 border rounded-lg text-sm" style="background-color: var(--input-bg); color: var(--text-search); border-color: var(--input-border);" />
                        <div class="flex justify-end gap-2">
                            <button class="bg-green-500 text-white px-3 py-1 rounded-full text-sm" onclick="saveEditedAddress('${escapeAttribute(data.id)}')">Save</button>
                            <button class="bg-gray-500 text-white px-3 py-1 rounded-full text-sm" onclick="toggleEditForm('${escapeAttribute(data.id)}')">Cancel</button>
                        </div>
                    </div>
                `;
                addressListEl.appendChild(div);
            });
        }

        // ==================== EDIT FUNCTIONS ====================
        function toggleEditForm(id) {
            const form = document.getElementById("edit-form-" + id);
            const display = document.getElementById("display-view-" + id);
            if (form && display) {
                form.classList.toggle("hidden");
                display.classList.toggle("hidden");
            }
        }

        async function saveEditedAddress(id) {
            const user = firebase.auth().currentUser;
            if (!user) return;
            
            const newPlace = document.getElementById("edit-place-" + id).value.trim();
            const newLandmark = document.getElementById("edit-landmark-" + id).value.trim();
            const newMapLink = document.getElementById("edit-map-" + id).value.trim();
            
            if (!newPlace || !newLandmark) {
                alert("Place and details cannot be empty.");
                return;
            }
            
            const coordinates = extractCoordinatesFromUrl(newMapLink);
            const updateObj = {
                place: capitalizeWords(newPlace),
                landmark: capitalizeWords(newLandmark),
                mapLink: newMapLink
            };
            
            if (coordinates) {
                updateObj.lat = coordinates.lat;
                updateObj.lng = coordinates.lng;
            } else if (newMapLink && !newMapLink.includes("goo.gl")) {
                const coords = await geocodeAddressToCoords(newMapLink);
                if (coords) {
                    updateObj.lat = coords.lat;
                    updateObj.lng = coords.lng;
                } else {
                    updateObj.lat = null;
                    updateObj.lng = null;
                }
            } else {
                updateObj.lat = null;
                updateObj.lng = null;
            }
            
            firebase.database().ref("addresses/" + user.uid + "/" + id).update(updateObj);
            toggleEditForm(id);
        }

        function deleteAddress(uid, id) {
            if (confirm("Are you sure you want to permanently delete this address?")) {
                firebase.database().ref("addresses/" + uid + "/" + id).remove();
            }
        }

        // ==================== SHARE FUNCTION ====================
        function shareAddress(place, landmark, mapLink, method) {
            let text = `📍 ${place}\n📝 ${landmark}`;
            if (mapLink) text += `\n🗺️ ${mapLink}`;
            
            if (method === "whatsapp") {
                window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank", "noopener,noreferrer");
            } else if (navigator.share) {
                navigator.share({ title: place, text: text });
            } else {
                navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
            }
        }

        // ==================== FILTER FUNCTIONS ====================
        function filterAddresses() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allAddresses.filter(item => 
                (item.place || '').toLowerCase().includes(query) || 
                (item.landmark || '').toLowerCase().includes(query)
            );
            displayFilteredAddresses(filtered);
        }

        function handleSearchInput(inputEl) {
            filterAddresses();
        }

        // ==================== MOBILE SEARCH FOCUS ====================
        function toggleMobileSearchFocus(isFocused) {
            if (window.innerWidth < 768) {
                if (isFocused) {
                    document.body.classList.add("search-active");
                } else {
                    document.body.classList.remove("search-active");
                    const searchInput = document.getElementById("searchInput");
                    if (searchInput) searchInput.value = "";
                    filterAddresses();
                }
            }
        }

        function exitSearchFocus() {
            toggleMobileSearchFocus(false);
            document.getElementById("searchInput").blur();
        }

        // ==================== VOICE SEARCH ====================
        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice search not supported in this browser.");
                return;
            }
            const recognition = new SpeechRecognition();
            const micIcon = document.querySelector("#micBtn i");
            
            recognition.onstart = () => {
                if (micIcon) micIcon.className = "fas fa-circle-notch fa-spin text-red-500";
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const input = document.getElementById("searchInput");
                if (input) {
                    input.value = transcript;
                    filterAddresses();
                }
                if (micIcon) micIcon.className = "fas fa-microphone text-xl text-indigo-600";
            };
            
            recognition.onerror = () => {
                if (micIcon) micIcon.className = "fas fa-microphone text-xl text-indigo-600";
            };
            
            recognition.onend = () => {
                if (micIcon) micIcon.className = "fas fa-microphone text-xl text-indigo-600";
            };
            
            recognition.start();
        }

        // ==================== GPS FUNCTION ====================
        function fetchGPS() {
            const btn = document.getElementById("gpsBtn");
            const mapInput = document.getElementById("mapInput");
            
            if (!navigator.geolocation) {
                alert("Geolocation not supported.");
                return;
            }
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Getting GPS...';
            btn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    mapInput.value = `https://www.google.com/maps?q=${lat},${lng}`;
                    btn.innerHTML = '<i class="fas fa-check"></i> Location Ready!';
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fas fa-location-crosshairs"></i> Get GPS Location';
                        btn.disabled = false;
                    }, 2000);
                },
                (error) => {
                    btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> GPS Failed';
                    btn.disabled = false;
                    alert("Could not get location. Please check permissions.");
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // ==================== AUTHENTICATION ====================
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadAddresses(user.uid);
            } else {
                window.location.href = "indexmob.html";
            }
        });

        function logout() {
            if (databaseRef) {
                databaseRef.off();
                databaseRef = null;
            }
            firebase.auth().signOut().then(() => {
                window.location.href = "indexmob.html";
            }).catch((error) => {
                console.error("Logout error:", error);
                window.location.href = "indexmob.html";
            });
        }

        // ==================== EXPOSE GLOBAL FUNCTIONS ====================
        window.saveAddress = saveAddress;
        window.saveEditedAddress = saveEditedAddress;
        window.toggleEditForm = toggleEditForm;
        window.deleteAddress = deleteAddress;
        window.shareAddress = shareAddress;
        window.fetchGPS = fetchGPS;
        window.startVoiceSearch = startVoiceSearch;
        window.handleSearchInput = handleSearchInput;
        window.toggleMobileSearchFocus = toggleMobileSearchFocus;
        window.exitSearchFocus = exitSearchFocus;
        window.filterAddresses = filterAddresses;
        window.navigateToLocation = navigateToLocation;
        window.toggleTheme = toggleTheme;
        window.logout = logout;
    </script>
</body>
</html>
