<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Savig | Smart Food Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fb 0%, #eef2f6 100%);
      color: #111827;
      transition: all 0.25s ease;
      min-height: 100vh;
    }

    body.dark-mode {
      background: linear-gradient(135deg, #0f1724 0%, #0a0f1c 100%);
      color: #e2e8f0;
    }

    .tracker-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    @media (min-width: 1024px) {
      .tracker-grid {
        flex-direction: row;
        align-items: stretch;
      }
      .left-panel-card {
        width: 42%;
        flex-shrink: 0;
      }
      .right-panel-card {
        width: 58%;
      }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 28px;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(203, 213, 225, 0.4);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }

    body.dark-mode .glass-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-color: rgba(59, 130, 246, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode .right-panel-card .glass-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    /* Right Panel Font Sizes */
    .right-panel-card .stat-modern p {
      font-size: 15px !important;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }

    .right-panel-card .stat-value {
      font-size: 15px !important;
      font-weight: 800;
    }

    .right-panel-card .expense-record .font-bold.text-sm,
    .right-panel-card .expense-record .font-bold {
      font-size: 19px !important;
    }

    .right-panel-card .expense-record .text-xs {
      font-size: 14px !important;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
    }

    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
    }

    .stat-modern {
      border-radius: 20px;
      padding: 14px 8px;
      text-align: center;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
      background: rgba(168, 154, 255, 0.08);
    }

    .stat-modern:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    body.dark-mode .stat-modern {
      padding: 14px 8px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body.dark-mode .stat-modern:nth-child(1) { background: linear-gradient(135deg, #4c1d95, #5b21b6); box-shadow: 0 8px 20px rgba(76, 29, 149, 0.3); }
    body.dark-mode .stat-modern:nth-child(2) { background: linear-gradient(135deg, #b45309, #d97706); box-shadow: 0 8px 20px rgba(180, 83, 9, 0.3); }
    body.dark-mode .stat-modern:nth-child(3) { background: linear-gradient(135deg, #0f766e, #0d9488); box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3); }
    body.dark-mode .stat-modern:nth-child(4) { background: linear-gradient(135deg, #9d174d, #db2777); box-shadow: 0 8px 20px rgba(157, 23, 77, 0.3); }
    body.dark-mode .stat-modern:nth-child(5) { background: linear-gradient(135deg, #3730a3, #4338ca); box-shadow: 0 8px 20px rgba(55, 48, 163, 0.3); }
    body.dark-mode .stat-modern:nth-child(6) { background: linear-gradient(135deg, #166534, #15803d); box-shadow: 0 8px 20px rgba(22, 101, 52, 0.3); }

    body.dark-mode .stat-modern p { color: #f1f5f9; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    body.dark-mode .stat-value { color: #ffffff !important; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

    .expense-record {
      transition: transform 0.2s, box-shadow 0.2s;
      background: #ffffff;
      border-radius: 20px;
      border-left: 4px solid #10b981;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    body.dark-mode .expense-record {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-left: 4px solid #34d399;
    }

    .input-fresh {
      background-color: #f9fafb;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      transition: all 0.2s;
      font-size: 12px;
      padding: 10px 14px;
      width: 100%;
      font-weight: 500;
    }

    body.dark-mode .input-fresh {
      background-color: #0f172a;
      border-color: #334155;
      color: #f1f5f9;
    }

    .input-fresh:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (max-width: 640px) {
      .form-row-3 {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }

    .dining-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .dining-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 1;
      min-width: 70px;
    }

    .circle-big {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffffff, #f0f4f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
      border: 2px solid transparent;
    }

    body.dark-mode .circle-big {
      background: linear-gradient(145deg, #1e293b, #0f172a);
    }

    .dining-option.selected .circle-big {
      border-color: #3b82f6;
      background: linear-gradient(145deg, #dbeafe, #eff6ff);
      transform: scale(1.03);
    }

    body.dark-mode .dining-option.selected .circle-big {
      background: linear-gradient(145deg, #1e3a8a, #1e40af);
      border-color: #60a5fa;
    }

    .dish-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
    }

    .dish-option-item {
      cursor: pointer;
      transition: all 0.15s;
      padding: 8px 10px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 13px;
      background: white;
      margin: 4px;
      text-align: center;
    }

    body.dark-mode .dish-option-item {
      background: #334155;
      color: #e2e8f0;
    }

    .dish-option-item:hover {
      background-color: #dbeafe;
      transform: translateX(4px);
    }

    /* Modern Pie Chart */
    .pie-wrapper {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 24px;
      padding: 20px;
      position: relative;
      transition: all 0.3s ease;
    }

    body.dark-mode .pie-wrapper {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .pie-chart-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 60px;
      white-space: nowrap;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      z-index: 10;
    }

    body.dark-mode .pie-chart-center {
      background: rgba(0, 0, 0, 0.75);
      color: #f1f5f9;
      backdrop-filter: blur(12px);
    }

    .mobile-toggle-btn {
      display: none;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      border-radius: 60px;
      padding: 14px 24px;
      font-weight: 700;
      font-size: 15px;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      margin: 0 0 16px 0;
      cursor: pointer;
      border: none;
    }

    @media (max-width: 1023px) {
      .mobile-toggle-btn { display: flex; }
      .left-panel-card {
        max-height: 0;
        overflow: hidden;
        padding: 0 !important;
        margin: 0 !important;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: scaleY(0);
        transform-origin: top;
      }
      .left-panel-card.open {
        max-height: 2200px;
        opacity: 1;
        transform: scaleY(1);
        margin-bottom: 24px !important;
        padding: 20px !important;
      }
    }

    @media (min-width: 1024px) {
      .mobile-toggle-btn { display: none; }
      .left-panel-card {
        max-height: none !important;
        opacity: 1 !important;
        overflow: visible !important;
      }
    }

    .auth-container { display: flex; gap: 12px; align-items: center; }
    .login-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dark-mode-toggle {
      background: #e2e8f0;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    body.dark-mode .dark-mode-toggle {
      background: #334155;
      color: #f1f5f9;
    }
    .scroll-custom::-webkit-scrollbar { width: 5px; }
    .scroll-custom::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
    body.dark-mode .scroll-custom::-webkit-scrollbar-track { background: #1e293b; }
  </style>
</head>
<body>
<div class="container mx-auto px-3 py-3 md:py-4 max-w-7xl">
  <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-200 dark:border-gray-800">
    <div class="flex items-center gap-3">
      <i class="fas fa-utensils text-blue-600 text-3xl dark:text-blue-400"></i>
      <span class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Food Tracker</span>
    </div>
    <div class="flex gap-3 items-center">
      <button id="darkModeToggle" class="dark-mode-toggle"><i class="fas fa-moon"></i> <span class="hidden sm:inline">Theme</span></button>
      <div id="authSection" class="auth-container">
        <button id="loginBtn" class="login-btn"><i class="fas fa-rocket"></i> Start</button>
      </div>
    </div>
  </div>
</div>

<button class="mobile-toggle-btn" id="mobileToggleBtn"><i class="fas fa-plus-circle"></i> Add New Expense</button>

<div class="tracker-grid">
  <!-- LEFT PANEL -->
  <div class="left-panel-card">
    <div class="glass-card p-5 md:p-6">
      <h2 class="text-xl font-bold flex items-center gap-2 mb-6"><i class="fas fa-pen-alt text-blue-500"></i> Log Expense</h2>
      <div class="dining-selector">
        <div class="dining-option" data-type="hotel"><div class="circle-big"><i class="fas fa-hotel"></i></div><span>Hotel</span></div>
        <div class="dining-option" data-type="zomato"><div class="circle-big"><i class="fas fa-pizza-slice"></i></div><span>Zomato</span></div>
        <div class="dining-option" data-type="swiggy"><div class="circle-big"><i class="fas fa-hamburger"></i></div><span>Swiggy</span></div>
        <div class="dining-option" data-type="other"><div class="circle-big"><i class="fas fa-ellipsis-h"></i></div><span>Other</span></div>
      </div>
      <input type="hidden" id="selectedPlatform" value="hotel">
      <div id="customPlatformBox" class="mb-4 hidden"><input type="text" id="customPlatformInput" placeholder="Platform name" class="input-fresh"></div>
      <div class="form-row-3">
        <div><label class="block text-xs font-semibold mb-1.5">🏨 Restaurant *</label><input type="text" id="hotelName" placeholder="Restaurant name" class="input-fresh"></div>
        <div><label class="block text-xs font-semibold mb-1.5">📍 District</label><select id="citySelect" class="input-fresh"><option value="">Select</option></select></div>
        <div><label class="block text-xs font-semibold mb-1.5">🏙️ Other city</label><input type="text" id="customCityInput" placeholder="Type city" class="input-fresh"></div>
      </div>
      <div class="form-row-3">
        <div><label class="block text-xs font-semibold mb-1.5">👥 Family count</label><input type="number" id="familyCount" min="1" max="50" value="2" class="input-fresh"></div>
        <div><label class="block text-xs font-semibold mb-1.5">⭐ Meal type</label><input type="text" id="mealTypePlaceholder" placeholder="Lunch/Dinner" class="input-fresh"></div>
        <div><label class="block text-xs font-semibold mb-1.5">📝 Occasion</label><input type="text" id="occasionPlaceholder" placeholder="Casual" class="input-fresh"></div>
      </div>
      <div class="mb-5">
        <div class="flex justify-between items-center mb-2"><label class="text-sm font-bold">🍲 Dishes *</label><span class="text-xs bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-full font-bold" id="selectedDishCount">0</span></div>
        <div class="relative mb-2"><input type="text" id="dishSearchInput" placeholder="Search dish..." class="input-fresh pr-10"><i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i></div>
        <button id="addCustomDishBtn" class="text-sm bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 px-5 py-1.5 rounded-full mb-3 font-medium"><i class="fas fa-plus-circle"></i> Custom dish</button>
        <div class="border rounded-xl max-h-32 overflow-y-auto p-2 bg-gray-50 dark:bg-gray-800/40 mb-2"><div id="dishOptionsList" class="grid grid-cols-2 sm:grid-cols-3 gap-1 text-sm"></div></div>
        <div id="selectedDishesContainer" class="flex flex-wrap gap-2 mt-2 min-h-[50px]"></div>
      </div>
      <div id="dishesDetailsArea" class="space-y-3 mt-3 max-h-52 overflow-y-auto scroll-custom pr-1"></div>
      <button id="saveExpenseBtn" class="mt-6 w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-lg"><i class="fas fa-save"></i> Save Expense</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel-card">
    <div class="glass-card p-5 md:p-6">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-5">
        <h2 class="text-xl font-bold flex items-center gap-3"><i class="fas fa-chart-pie text-green-500"></i> Dashboard</h2>
        <div class="relative w-full sm:w-80">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm z-10"></i>
          <input type="text" id="searchRecords" placeholder="Search by hotel, dish or city..." class="input-fresh pl-9 py-2.5 text-sm w-full">
        </div>
      </div>
        <div class="stats-grid">
        <div class="stat-modern"><p>🏨 Hotel (Monthly)</p><p id="monthlyHotelCount" class="stat-value" style="color:#7c3aed;">0</p></div>
        <div class="stat-modern"><p>📱 Online (Monthly)</p><p id="monthlyOnlineCount" class="stat-value" style="color:#d97706;">0</p></div>
        <div class="stat-modern"><p>🏨 Hotel (Yearly)</p><p id="yearlyHotelCount" class="stat-value" style="color:#0d9488;">0</p></div>
        <div class="stat-modern"><p>📱 Online (Yearly)</p><p id="yearlyOnlineCount" class="stat-value" style="color:#db2777;">0</p></div>
        <div class="stat-modern"><p>💰 Total Monthly</p><p id="monthlyTotal" class="stat-value" style="color:#4338ca;">₹0</p></div>
        <div class="stat-modern"><p>💰 Total Yearly</p><p id="yearlyTotal" class="stat-value" style="color:#15803d;">₹0</p></div>
      </div>
      <div id="entriesList" class="space-y-3 mb-6 max-h-[320px] overflow-y-auto pr-2 scroll-custom"><div class="text-center text-gray-400 py-12">✨ Start tracking to see expenses</div></div>
      
      <!-- STATS GRID - 6 boxes -->
     
      
      <!-- Modern Pie Chart Section -->
      <div class="grid grid-cols-1 gap-5">
        <div class="pie-wrapper relative">
          <p class="text-sm font-bold mb-3"><i class="fas fa-chart-pie text-blue-500"></i> Spend by platform</p>
          <canvas id="attractivePieChart" width="200" height="250" style="max-height: 250px; width:90%"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
    authDomain: "sk12-58e9e.firebaseapp.com",
    databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com",
    projectId: "sk12-58e9e",
    storageBucket: "sk12-58e9e.appspot.com",
    messagingSenderId: "470207874652",
    appId: "1:470207874652:web:67ba1cf3629b7e5b144899"
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const auth = firebase.auth();
  
  let allExpenses = [];
  let activeDishes = [];
  let pieChartGlobal = null;
  let currentUser = null;
  let searchTimeout = null;
  
  const vegDishes = ["Paneer Butter Masala","Shahi Paneer","Kadai Paneer","Palak Paneer","Dal Makhani","Chana Masala","Veg Biryani","Masala Dosa","Idli Sambhar","Pav Bhaji","Samosa","Dhokla","Vada Pav","Chole Bhature","Aloo Paratha","Veg Manchurian","Chilli Paneer","Gobi Manchurian","Hakka Noodles","Spring Rolls","Veg Pizza","Garlic Bread","Cheese Balls","French Fries","Gulab Jamun","Jalebi","Rasmalai","Kheer","Mango Lassi","Masala Chai","Veg Burger","Aloo Tikki","Malai Kofta","Dal Tadka","Jeera Rice","Naan","Butter Naan","Rava Dosa","Uttapam","Medu Vada","Upma","Bhindi Masala","Aloo Gobi","Baingan Bharta","Rajma","Kadhi Pakora","Veg Kolhapuri","Methi Malai Matar","Schezwan Noodles","Honey Chilli Potato","Paneer Momos","Veg Momos","Corn Cheese Balls","Crispy Corn","Stuffed Mushroom","Tandoori Aloo","Veg Seekh Kebab","Paneer Tikka"];
  const DISH_LIST = [...new Set(vegDishes)];
  const MAHA_DISTRICTS = ["Mumbai City","Mumbai Suburban","Thane","Palghar","Raigad","Ratnagiri","Sindhudurg","Pune","Satara","Sangli","Kolhapur","Solapur","Ahmednagar","Nashik","Jalgaon","Dhule","Nandurbar","Aurangabad","Jalna","Parbhani","Hingoli","Nanded","Latur","Osmanabad","Beed","Nagpur","Wardha","Bhandara","Gondia","Chandrapur","Gadchiroli","Amravati","Akola","Buldhana","Yavatmal","Washim"];
  
  // Theme with localStorage
  function initTheme() {
    const savedTheme = localStorage.getItem('savig_theme');
    if (savedTheme === 'dark') document.body.classList.add('dark-mode');
    else if (savedTheme === 'light') document.body.classList.remove('dark-mode');
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark-mode');
  }
  function toggleTheme() {
    if (document.body.classList.contains('dark-mode')) {
      document.body.classList.remove('dark-mode');
      localStorage.setItem('savig_theme', 'light');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('savig_theme', 'dark');
    }
    renderPieChart(); // Refresh chart colors
  }
  
  function formatDate(dateStr) { const d = new Date(dateStr); return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }
  
  async function anonymousLogin() {
    try {
      const result = await auth.signInAnonymously();
      currentUser = result.user;
      document.getElementById('loginBtn').style.display = 'none';
      await loadDataFromFirebase();
      return true;
    } catch(error) { alert("Login failed: " + error.message); return false; }
  }
  
  auth.onAuthStateChanged(async (user) => {
    if (user) { currentUser = user; document.getElementById('loginBtn').style.display = 'none'; await loadDataFromFirebase(); } 
    else { currentUser = null; document.getElementById('loginBtn').style.display = 'flex'; }
  });
  
  async function loadDataFromFirebase() {
    if (!currentUser) return;
    const snapshot = await database.ref(`savig_expenses/${currentUser.uid}`).once('value');
    const data = snapshot.val();
    allExpenses = data ? Object.entries(data).map(([id, value]) => ({ id, ...value })).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)) : [];
    updateStats();
    renderEntries();
    renderPieChart();
  }
  
  // MODERN PIE CHART with labels showing ₹ and %
  function renderPieChart() {
    const totals = { hotel:0, zomato:0, swiggy:0, other:0 };
    allExpenses.forEach(e => {
      const total = e.dishes.reduce((s,d)=>s+d.price,0);
      if(e.type === "hotel") totals.hotel += total;
      else if(e.type === "zomato") totals.zomato += total;
      else if(e.type === "swiggy") totals.swiggy += total;
      else totals.other += total;
    });
    const grandTotal = totals.hotel + totals.zomato + totals.swiggy + totals.other;
    const ctx = document.getElementById('attractivePieChart').getContext('2d');
    if(pieChartGlobal) pieChartGlobal.destroy();
    
    // Modern gradient colors
    const isDark = document.body.classList.contains('dark-mode');
    pieChartGlobal = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: [' Hotel', ' Zomato', ' Swiggy', ' Other'],
        datasets: [{
          data: [totals.hotel, totals.zomato, totals.swiggy, totals.other],
          backgroundColor: ['#3b82f6', '#f97316', '#ef4444', '#8b5cf6'],
          borderWidth: 0,
          cutout: '68%',
          borderRadius: 8,
          spacing: 3,
          hoverOffset: 12
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { 
            position: 'bottom', 
            labels: { 
              font: { size: 14, weight: '600' }, 
              color: isDark ? '#e2e8f0' : '#1e293b',
              padding: 15,
              usePointStyle: true,
              pointStyle: 'circle'
            } 
          },
          tooltip: {
            backgroundColor: isDark ? '#1e293b' : '#ffffff',
            titleColor: isDark ? '#f1f5f9' : '#0f172a',
            bodyColor: isDark ? '#cbd5e1' : '#334155',
            borderColor: '#3b82f6',
            borderWidth: 1,
            callbacks: {
              label: (ctx) => {
                let val = ctx.raw;
                let perc = grandTotal > 0 ? ((val/grandTotal)*100).toFixed(1) : 0;
                return ` ₹${val.toFixed(0)}  (${perc}%)`;
              }
            }
          }
        }
      }
    });
    
    // Update center text
    const container = document.querySelector('.pie-wrapper');
    let oldCenter = container.querySelector('.pie-chart-center');
    if(oldCenter) oldCenter.remove();
    const centerDiv = document.createElement('div');
    centerDiv.className = 'pie-chart-center';
    centerDiv.innerHTML = `<div style="font-weight:800; font-size:20px;">₹${grandTotal.toFixed(0)}</div><div style="font-size:11px;">Total Spend</div>`;
    container.style.position = 'relative';
    container.appendChild(centerDiv);
  }
  
  function updateStats() {
    const now = new Date(), curMonth = now.getMonth(), curYear = now.getFullYear();
    let mHotel=0, mOnline=0, yHotel=0, yOnline=0, mExp=0, yExp=0;
    allExpenses.forEach(exp => {
      const d = new Date(exp.createdAt);
      const total = exp.dishes.reduce((s,di)=>s+di.price,0);
      const isHotel = exp.type === "hotel";
      const isOnline = exp.type !== "hotel";
      if(d.getFullYear() === curYear) {
        yExp += total;
        if(isHotel) yHotel++;
        if(isOnline) yOnline++;
      }
      if(d.getMonth() === curMonth && d.getFullYear() === curYear) {
        mExp += total;
        if(isHotel) mHotel++;
        if(isOnline) mOnline++;
      }
    });
    document.getElementById("monthlyHotelCount").innerText = mHotel;
    document.getElementById("monthlyOnlineCount").innerText = mOnline;
    document.getElementById("yearlyHotelCount").innerText = yHotel;
    document.getElementById("yearlyOnlineCount").innerText = yOnline;
    document.getElementById("monthlyTotal").innerHTML = `₹${mExp.toFixed(0)}`;
    document.getElementById("yearlyTotal").innerHTML = `₹${yExp.toFixed(0)}`;
  }
  
  // FAST SEARCH with debounce
  function renderEntries() {
    const kw = document.getElementById("searchRecords")?.value.toLowerCase() || "";
    let filtered = allExpenses.filter(e => e.hotelName.toLowerCase().includes(kw) || e.city.toLowerCase().includes(kw) || e.dishes.some(d=>d.dishName.toLowerCase().includes(kw)));
    const container = document.getElementById("entriesList");
    if(filtered.length===0) { container.innerHTML='<div class="text-center text-gray-400 py-10">📭 No matching expenses.</div>'; return; }
    container.innerHTML = filtered.map(exp => {
      const total = exp.dishes.reduce((s,d)=>s+d.price,0);
      const preview = exp.dishes.slice(0,2).map(d=>`${d.dishName} (₹${d.price})`).join(', ') + (exp.dishes.length>2 ? '...' : '');
      const platformLabel = exp.type === 'hotel' ? 'Hotel' : exp.type;
      return `<div class="expense-record"><div class="flex justify-between items-start flex-wrap"><div class="flex-1"><div class="flex items-center gap-2 flex-wrap"><span class="font-bold text-sm">${escapeHtml(exp.hotelName)}</span><span class="text-xs bg-blue-100 dark:bg-blue-900/60 px-2 py-0.5 rounded-full">${escapeHtml(platformLabel)}</span></div><div class="text-xs text-gray-500 dark:text-gray-400 flex gap-3 flex-wrap mt-1"><span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(exp.city)}</span><span><i class="fas fa-users"></i> 👥 ${exp.familyCount}</span><span><i class="far fa-calendar"></i> ${formatDate(exp.createdAt)}</span></div><div class="text-xs mt-1">🍽️ ${preview}</div><div class="text-sm font-bold mt-1">₹${total.toFixed(2)}</div></div><div class="flex gap-3"><button class="deleteBtn text-red-500 hover:scale-110 transition" data-id="${exp.id}"><i class="fas fa-trash-alt"></i></button><button class="shareBtn text-green-600 hover:scale-110 transition" data-id="${exp.id}"><i class="fas fa-share-alt"></i></button></div></div></div>`;
    }).join('');
    document.querySelectorAll('.deleteBtn').forEach(btn => btn.addEventListener('click', async (e) => { if(confirm("Delete entry?")) { await deleteExpenseFromFirebase(btn.getAttribute('data-id')); await loadDataFromFirebase(); } }));
    document.querySelectorAll('.shareBtn').forEach(btn => btn.addEventListener('click', (e) => { const entry = allExpenses.find(ex=>ex.id===btn.getAttribute('data-id')); if(entry && navigator.share) navigator.share({title:'Savig', text:`${entry.hotelName} | ₹${entry.dishes.reduce((s,d)=>s+d.price,0)}`}); }));
  }
  
  async function deleteExpenseFromFirebase(expenseId) {
    if (!currentUser) return;
    await database.ref(`savig_expenses/${currentUser.uid}/${expenseId}`).remove();
  }
  
  // Dish helpers
  function renderDishOptions(search="") { 
    const container = document.getElementById("dishOptionsList"); 
    let filtered = DISH_LIST.filter(d=>d.toLowerCase().includes(search.toLowerCase())).slice(0,36); 
    container.innerHTML = filtered.map(dish=>`<div class="dish-option-item text-xs" data-dish="${dish.replace(/"/g,'&quot;')}">🌱 ${dish}</div>`).join(''); 
    document.querySelectorAll('.dish-option-item').forEach(el=>{ el.addEventListener('click',()=>{ const dishName=el.getAttribute('data-dish'); if(!activeDishes.some(d=>d.dishName===dishName)){ activeDishes.push({dishName, price:0, rating:3, review:""}); updateDishesUI(); } document.getElementById("dishSearchInput").value=""; renderDishOptions(""); }); }); 
  }
  function addCustomDish() { const input = document.getElementById("dishSearchInput"); const custom = input.value.trim(); if(custom && !activeDishes.some(d=>d.dishName===custom)) { activeDishes.push({dishName:custom, price:0, rating:3, review:""}); updateDishesUI(); input.value=""; renderDishOptions(""); } else alert(custom ? "Already added" : "Enter a dish name"); }
  function updateDishesUI() { 
    const container = document.getElementById("selectedDishesContainer"); 
    document.getElementById("selectedDishCount").innerText = `${activeDishes.length}`; 
    if(activeDishes.length===0) container.innerHTML='<span class="text-gray-400 text-xs">No dishes. Search or add custom.</span>'; 
    else { container.innerHTML = activeDishes.map((d,i)=>`<span class="dish-tag">🍽️ ${d.dishName} <i class="fas fa-times-circle cursor-pointer text-red-500 ml-1" data-index="${i}"></i></span>`).join(''); document.querySelectorAll('.dish-tag .fa-times-circle').forEach(el=>{ el.addEventListener('click',()=>{ const idx=parseInt(el.getAttribute('data-index')); activeDishes.splice(idx,1); updateDishesUI(); renderDishForms(); }); }); } renderDishForms(); 
  }
  function renderDishForms() { 
    const area = document.getElementById("dishesDetailsArea"); 
    if(activeDishes.length===0){ area.innerHTML='<div class="text-sm text-gray-400 italic p-2">✨ Add dishes — price required.</div>'; return; } 
    area.innerHTML = activeDishes.map((dish,idx)=>`<div class="border rounded-xl p-2.5 bg-gray-50 dark:bg-gray-800/60"><div class="font-semibold text-xs mb-1.5">🍽️ ${dish.dishName}</div><div class="grid grid-cols-2 gap-2"><div><label class="text-xs font-medium">💰 Price (₹) *</label><input type="number" class="dish-price w-full p-2 rounded-lg border input-fresh" data-idx="${idx}" value="${dish.price||0}" step="1" min="1"></div><div><label class="text-xs font-medium">⭐ Rating</label><input type="number" class="dish-rating w-full p-2 rounded-lg border input-fresh" data-idx="${idx}" value="${dish.rating||3}" step="0.5" min="0" max="5"></div></div><div class="mt-1"><label class="text-xs font-medium">📝 Review</label><input type="text" class="dish-review w-full p-2 rounded-lg border input-fresh" data-idx="${idx}" value="${dish.review||''}" placeholder="Tasty..."></div></div>`).join(''); 
    document.querySelectorAll('.dish-price').forEach(inp=>inp.addEventListener('change',(e)=>{ let i=parseInt(inp.dataset.idx); activeDishes[i].price=parseFloat(inp.value)||0; })); 
    document.querySelectorAll('.dish-rating').forEach(inp=>inp.addEventListener('change',(e)=>{ let i=parseInt(inp.dataset.idx); activeDishes[i].rating=parseFloat(inp.value)||0; })); 
    document.querySelectorAll('.dish-review').forEach(inp=>inp.addEventListener('input',(e)=>{ let i=parseInt(inp.dataset.idx); activeDishes[i].review=inp.value; })); 
  }
  
  async function saveExpense() {
    if (!currentUser) await anonymousLogin();
    let platform = document.getElementById("selectedPlatform").value;
    const customPlat = document.getElementById("customPlatformInput");
    if(platform==='other' && customPlat.value.trim()) platform = customPlat.value.trim();
    const hotel = document.getElementById("hotelName").value.trim();
    let city = document.getElementById("citySelect").value || document.getElementById("customCityInput").value.trim();
    const family = parseInt(document.getElementById("familyCount").value) || 1;
    if(!hotel) { alert("Restaurant name required"); return; }
    if(!city) city = "Maharashtra";
    if(activeDishes.length===0 || activeDishes.some(d=>d.price<=0)) { alert("Add at least one dish with price > 0"); return; }
    const newExp = { id: Date.now().toString(), type: platform, hotelName: hotel, city, familyCount: family, dishes: activeDishes.map(d=>({ dishName: d.dishName, price: d.price, rating: d.rating, review: d.review })), createdAt: new Date().toISOString(), mealType: document.getElementById("mealTypePlaceholder").value, occasion: document.getElementById("occasionPlaceholder").value };
    await saveExpenseToFirebase(newExp);
    resetForm();
    await loadDataFromFirebase();
    alert("✅ Expense saved!");
  }
  
  async function saveExpenseToFirebase(expense) {
    if (!currentUser) await anonymousLogin();
    await database.ref(`savig_expenses/${currentUser.uid}/${expense.id}`).set(expense);
  }
  
  function resetForm() { activeDishes = []; updateDishesUI(); document.getElementById("hotelName").value=""; document.getElementById("citySelect").value=""; document.getElementById("customCityInput").value=""; document.getElementById("familyCount").value="2"; document.getElementById("mealTypePlaceholder").value=""; document.getElementById("occasionPlaceholder").value=""; document.querySelector('.dining-option[data-type="hotel"]')?.click(); document.getElementById("customPlatformInput").value=""; document.getElementById("customPlatformBox")?.classList.add("hidden"); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function populateCityDropdown() { const sel = document.getElementById("citySelect"); sel.innerHTML = '<option value="">-- Select --</option>'; MAHA_DISTRICTS.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; }); }
  function initDiningSelector() { document.querySelectorAll('.dining-option').forEach(circle=>{ circle.addEventListener('click',()=>{ document.querySelectorAll('.dining-option').forEach(c=>c.classList.remove('selected')); circle.classList.add('selected'); const dtype=circle.getAttribute('data-type'); document.getElementById("selectedPlatform").value=dtype; document.getElementById("customPlatformBox").classList.toggle('hidden', dtype!=='other'); if(dtype!=='other') document.getElementById("customPlatformInput").value=""; }); }); document.querySelector('.dining-option[data-type="hotel"]')?.classList.add('selected'); }
  
  document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    document.getElementById('darkModeToggle').addEventListener('click', () => { toggleTheme(); });
    populateCityDropdown(); renderDishOptions(""); updateDishesUI(); initDiningSelector();
    document.getElementById("saveExpenseBtn").addEventListener("click", saveExpense);
    // Fast search with debounce
    const searchInput = document.getElementById("searchRecords");
    searchInput.addEventListener('input', () => {
      if(searchTimeout) clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => renderEntries(), 150);
    });
    document.getElementById("dishSearchInput").addEventListener("input", (e) => renderDishOptions(e.target.value));
    document.getElementById("addCustomDishBtn").addEventListener("click", addCustomDish);
    document.getElementById("loginBtn").addEventListener("click", anonymousLogin);
    const mobileBtn = document.getElementById('mobileToggleBtn');
    const leftPanel = document.querySelector('.left-panel-card');
    if(mobileBtn) mobileBtn.addEventListener('click', () => { leftPanel.classList.toggle('open'); mobileBtn.innerHTML = leftPanel.classList.contains('open') ? '<i class="fas fa-times-circle"></i> Close Form' : '<i class="fas fa-plus-circle"></i> Add New Expense'; });
    if(window.innerWidth < 1024) leftPanel?.classList.remove('open');
  });
</script>
</body>
