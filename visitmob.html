<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>savig</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
    // 1. Apply theme before page renders
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();

    // 2. Listen for theme changes in other open tabs
    window.addEventListener('storage', (event) => {
        if (event.key === 'theme') {
            document.documentElement.setAttribute('data-theme', event.newValue);
        }
    });
</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; transition: all 0.3s ease; }
        .glass-card { background: white; border: 1px solid #e2e8f0; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media (max-width: 768px) {
            /* Focus Mode UI Hiding */
            body.search-active #headerBranding, 
            body.search-active #formColumn {
                display: none !important;
            }
/* Custom Scrollbar for the History Table */

            body.search-active #backArrow {
                display: block !important;
            }

            /* Keep Search container fixed at top */
            body.search-active #searchContainer {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                padding: 1rem;
                background: #f8fafc;
                z-index: 100;
                border-bottom: 1px solid #e2e8f0;
                margin: 0 !important;
            }

            /* Push history list down */
            body.search-active #historyColumn {
                margin-top: 10px !important;
            }

            /* Keep export bar visible */
            body.search-active #historyColumn .bg-slate-50\/80 {
                display: flex !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">
 <div id="loginSection" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center hidden">
        
    </div>

   
    <div id="mainContent" class="max-w-6xl mx-auto space-y-6 hidden">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 animate__animated animate__fadeIn relative z-30">
            <div id="headerBranding">
                <h1 class="text-xl font-black tracking-tight text-slate-900">Daily Visit <span class="text-blue-600">Registry</span></h1>
          
                </div>
            </div>

            <div id="searchContainer" class="w-full md:w-80 relative z-40 transition-all duration-300"> 
                <div class="relative flex items-center gap-2">
                    <button id="backArrow" class="hidden p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </button>
                    <div class="relative flex-grow">
                        <input type="text" id="searchInput" placeholder="Search by name or place..." 
                            class="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:outline-none shadow-sm text-sm bg-white">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 mt-[-10]">
            
      <div id="formColumn" class="lg:col-span-1 space-y-4">
    <div class="glass-card rounded-3xl shadow-sm bg-white border border-slate-200 overflow-hidden transition-all duration-300">
        
        <button onclick="window.toggleForm()" class="w-full p-6 flex items-center justify-between hover:bg-slate-50 transition-colors focus:outline-none">
            <h2 id="formTitle" class="text-lg font-bold flex items-center gap-2">
                <span class="w-2 h-3 bg-blue-600 rounded-full"></span> 
                <span id="formHeaderText">New Visit Log</span>
            </h2>
            <div id="toggleIcon" class="w-6 h-6 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center transition-transform duration-300">
                <i class="fa-solid fa-plus"></i>
            </div>
        </button>

        <div id="collapsibleForm" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out opacity-0 px-6">
            <form id="visitForm" class="space-y-4 pb-2">
                <input type="hidden" id="editId">
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Visitor Name</label>
                    <input type="text" id="visitorName" placeholder="Enter name" required class="w-full p-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Location</label>
                        <select id="visitLocation" class="w-full p-2 rounded-xl border border-slate-200 bg-white text-sm focus:outline-none">
                            <option value="Home" selected>🏠 Home</option>
                            <option value="Bank">🏦 Bank</option>
                            <option value="Office">🏢 Office</option>
                            <option value="Friends Home">🤝 Friend's Home</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Date</label>
                        <input type="date" id="visitDate" required class="w-full p-3 rounded-xl border border-slate-200 text-sm">
                    </div>
                </div>

                <div class="space-y-6 pt-2 border-t border-slate-100">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Timeline</label>
                    <div class="flex items-center gap-1">
                        <div class="relative flex-1">
                            <span class="text-[9px] text-slate-400 font-bold uppercase block mb-1">Arrival</span>
                            <input type="time" id="timeIn" class="w-full p-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                        </div>
                        <div class="relative flex-1">
                            <span class="text-[9px] text-slate-400 font-bold uppercase block mb-1">Departure</span>
                            <input type="time" id="timeOut" class="w-full p-3 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase mb-1 tracking-widest">Transport</label>
                        <select id="travelMode" class="w-full p-2 rounded-xl border border-slate-200 bg-white text-sm">
                            <option value="" selected>-- Select Transport --</option>
                            <option value="🚗 Personal Car">Private Car</option>
                            <option value="🏍️ Two Wheeler">Two Wheeler</option>
                            <option value="🚌 Public Bus">Public Bus</option>
                            <option value="🚶 Walking">Walking</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase mb-1 tracking-widest">Purpose</label>
                        <input type="text" id="visitReason" placeholder="Purpose (Optional)" class="w-full p-2 text-slate-700 rounded-xl border border-slate-200 text-sm bg-slate-50/50">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-2xl shadow-xl transition-all mt-2">
                    Save Visit Record
                </button>
            </form>
            <div id="status" class="mb-2 text-center text-xs font-bold"></div>
        </div>
    </div>
</div>

<div id="historyColumn" class="lg:col-span-2 mb-5">
    <div class="glass-card rounded-3xl shadow-sm overflow-hidden flex flex-col h-[calc(330px-220px)] md:h-[calc(400px-140px)] relative bg-white">
        
        <div class="p-4 bg-slate-50/80 border-b border-slate-100 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-1 flex-grow">
                <select id="shareOption" class="text-xs font-bold p-2.5 rounded-xl border border-slate-200 bg-white shadow-sm outline-none">
                    <option value="all">Export: All Records</option>
                    <option value="today">Today's Log</option>
                </select>
                <button id="shareBtn" class="bg-green-600 hover:bg-green-700 text-white p-2.5 rounded-xl shadow-lg active:scale-90 transition-all">
                    <i class="fa-solid fa-share-nodes"></i>
                </button>
            </div>
            <span id="recordCount" class="text-[9px] font-black bg-blue-100 text-blue-700 px-2 py-1.5 rounded-lg uppercase">0 Records</span>
        </div>

        <div class="flex-grow overflow-y-auto custom-scrollbar"> 
            <table class="w-full text-left border-collapse">
                <thead class="sticky top-0 z-30 shadow-sm">
                    <tr class="bg-white text-slate-700 text-[10px] uppercase font-black tracking-widest border-b border-slate-100">
                        <th class="px-2 py-2 bg-white">Visitor & Timeline</th>
                        <th class="px-2 py-2 text-center bg-white">Location</th>
                        <th class="px-2 py-2 text-right bg-white">Actions</th>
                    </tr>
                </thead>
                <tbody id="visitTableBody" class="divide-y divide-slate-50"></tbody>
            </table>
            <div id="loadingMessage" class="py-12 text-center text-slate-400 italic">Syncing Savig...</div>
        </div>
    </div>
</div>
</body>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB78RTVCg0cmSPp7A1RJyyAgBuCeolO0cc",
        authDomain: "sk12-58e9e.firebaseapp.com",
        projectId: "sk12-58e9e",
        storageBucket: "sk12-58e9e.appspot.com",
        messagingSenderId: "470207874652",
        appId: "1:470207874652:web:67ba1cf3629b7e5b144899",
        databaseURL: "https://sk12-58e9e-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUid = null;
    let allVisits = [];
    let isEditing = false;

    // --- DOM Elements ---
    const searchInput = document.getElementById('searchInput');
    const backArrow = document.getElementById('backArrow');
    const recordCountBadge = document.getElementById('recordCount');
    const visitForm = document.getElementById('visitForm');
    const submitBtn = document.getElementById('submitBtn');
    const headerBranding = document.getElementById('headerBranding');
    const formColumn = document.getElementById('formColumn');

    // --- DATE & TIME DEFAULT FUNCTION ---
    const setDateTimeDefaults = () => {
        try {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            const dateInput = document.getElementById('visitDate');
            if (dateInput) dateInput.value = `${year}-${month}-${day}`;

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeInInput = document.getElementById('timeIn');
            if (timeInInput) timeInInput.value = `${hours}:${minutes}`;
            
            const future = new Date(now.getTime() + (60 * 60 * 1000));
            const fHours = String(future.getHours()).padStart(2, '0');
            const fMinutes = String(future.getMinutes()).padStart(2, '0');
            const timeOutInput = document.getElementById('timeOut');
            if (timeOutInput) timeOutInput.value = `${fHours}:${fMinutes}`;
        } catch (err) {
            console.error("Savig: Error setting defaults", err);
        }
    };

    // --- SEARCH FOCUS MODE HELPERS ---
    const exitSearchFocus = () => {
        document.body.classList.remove('search-active');
        if(headerBranding) headerBranding.classList.remove('hidden');
        if(formColumn) formColumn.classList.remove('hidden');
        if(backArrow) backArrow.classList.add('hidden');
        searchInput.value = "";
        if(recordCountBadge) recordCountBadge.classList.remove('hidden');
        renderTable(allVisits);
    };

    const enterSearchFocus = () => {
        if (window.innerWidth < 768) {
            document.body.classList.add('search-active');
            if(headerBranding) headerBranding.classList.add('hidden');
            if(formColumn) formColumn.classList.add('hidden');
            if(backArrow) backArrow.classList.remove('hidden');
            if(recordCountBadge) recordCountBadge.classList.add('hidden');
        }
    };

    if(searchInput) searchInput.addEventListener('focus', enterSearchFocus);
    if(backArrow) backArrow.addEventListener('click', exitSearchFocus);

    // --- AUTHENTICATION ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUid = user.uid;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            const nameEl = document.getElementById('userName');
            const imgEl = document.getElementById('userImg');
            if (nameEl) nameEl.innerText = user.displayName;
            if (imgEl) imgEl.src = user.photoURL;
            loadData(user.uid);
        } else {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }
    });

    const googleBtn = document.getElementById('googleLoginBtn');
    if (googleBtn) googleBtn.onclick = () => signInWithPopup(auth, provider);

    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.onclick = () => signOut(auth);

    // --- DATA HANDLING ---
    function loadData(uid) {
        onValue(ref(db, `visits/${uid}`), (snapshot) => {
            const data = snapshot.val();
            allVisits = [];
            if (data) {
                Object.keys(data).forEach(key => allVisits.push({ id: key, ...data[key] }));
            }
            allVisits.sort((a, b) => b.createdAt - a.createdAt);
            renderTable(allVisits);
            const loadingMsg = document.getElementById('loadingMessage');
            if(loadingMsg) loadingMsg.style.display = 'none';
            if(recordCountBadge) recordCountBadge.innerText = `${allVisits.length} Records`;
        });
    }


// Auto-open function for when you click EDIT
const originalInitEdit = window.initEdit;
window.initEdit = (id) => {
    // Open the form automatically if it's closed
    const content = document.getElementById('collapsibleForm');
    if (!content.style.maxHeight) toggleForm();
    
    // Original edit logic runs after
    originalInitEdit(id);
};
    function renderTable(data) {
        const tableBody = document.getElementById('visitTableBody');
        if (!tableBody) return;
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="3" class="py-20 text-center text-slate-400 italic">No records found.</td></tr>`;
            return;
        }
        tableBody.innerHTML = data.map((v) => `
            <tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                <td class="px-2 py-2">
                    <div class="font-bold text-slate-900">${v.name}</div>
                    <div class="flex flex-wrap items-center mt-1">
                        <span class="text-[10px] text-slate-500 font-medium">📅 ${v.date}</span>
                        ${(v.timeIn || v.timeOut) ? `
                            <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold border border-blue-100">
                                🕒 ${v.timeIn || '--'} to ${v.timeOut || '--'}
                            </span>
                        ` : ''}
                    </div>
                    ${v.reason ? `<div class="text-[10px] text-slate-400 mt-1 italic">"${v.reason}"</div>` : ''}
                </td>
                <td class="px-6 py-4 text-center">
                    <div class="text-[10px] px-1 py-1 rounded-lg border border-slate-200 bg-white font-black text-slate-600 uppercase tracking-tighter inline-block mb-1">${v.location}</div>
                    ${v.travel ? `<div class="text-[11px] mt-1">${v.travel}</div>` : ''}
                </td>
                <td class="px-2 py-2 text-right flex justify-end ">
                    <button onclick="initEdit('${v.id}')" class="p-1 text-green-600 hover:bg-green-50 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
                    <button onclick="deleteLog('${v.id}')" class="p-1 text-red-600 hover:bg-red-50 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                </td>
            </tr>`).join('');
    }

    if(searchInput) {
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            const tableBody = document.getElementById('visitTableBody');
            if (term === "" && window.innerWidth < 768) {
                exitSearchFocus();
                return;
            }
            const filtered = allVisits.filter(v => v.name.toLowerCase().includes(term) || v.location.toLowerCase().includes(term));
            if (filtered.length > 0) renderTable(filtered);
            else if(tableBody) tableBody.innerHTML = `<tr><td colspan="3" class="py-20 text-center text-slate-400 italic">No matches found for "${term}"</td></tr>`;
        });
    }

    // --- SAVE & EDIT LOGIC ---
    if(visitForm) {
        visitForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editIdVal = document.getElementById('editId').value;
            submitBtn.disabled = true;

            const payload = {
                name: document.getElementById('visitorName').value,
                location: document.getElementById('visitLocation').value,
                date: document.getElementById('visitDate').value,
                timeIn: document.getElementById('timeIn').value || "",
                timeOut: document.getElementById('timeOut').value || "",
                travel: document.getElementById('travelMode').value || "",
                reason: document.getElementById('visitReason').value || "",
                createdAt: isEditing ? allVisits.find(v => v.id === editIdVal).createdAt : Date.now()
            };

            try {
                if (isEditing) {
                    await set(ref(db, `visits/${currentUid}/${editIdVal}`), payload);
                    isEditing = false;
                    submitBtn.innerText = "Save Visit Record";
                    submitBtn.classList.replace("bg-orange-500", "bg-blue-900");
                    const formTitle = document.getElementById('formTitle');
                    if(formTitle) formTitle.innerText = "New Visit Log";
                } else {
                    await push(ref(db, `visits/${currentUid}`), payload);
                }

                visitForm.reset(); 
                document.getElementById('editId').value = "";
                
                // FIXED: Call the function instead of typing hardcoded times
                setDateTimeDefaults(); 
                
                const status = document.getElementById('status');
                if(status) status.innerHTML = "<span class='text-green-500 font-bold'>✔ Data Secured</span>";
            } catch (err) { 
                alert("Error: " + err.message); 
            } finally { 
                submitBtn.disabled = false; 
                setTimeout(() => { if(status) status.innerHTML = ""; }, 3000); 
            }
        });
    }

    // --- EDIT FUNCTION ---
    window.initEdit = (id) => {
        const item = allVisits.find(v => v.id === id);
        if (!item) return;
        isEditing = true;
        document.getElementById('editId').value = id;
        document.getElementById('visitorName').value = item.name;
        document.getElementById('visitLocation').value = item.location;
        document.getElementById('visitDate').value = item.date;
        document.getElementById('timeIn').value = item.timeIn;
        document.getElementById('timeOut').value = item.timeOut;
        document.getElementById('travelMode').value = item.travel || "";
        document.getElementById('visitReason').value = item.reason || "";
        
        const formTitle = document.getElementById('formTitle');
        if(formTitle) formTitle.innerText = "Edit Visit Log";
        submitBtn.innerText = "Update Record";
        submitBtn.classList.replace("bg-blue-900", "bg-orange-500");
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.deleteLog = (id) => { 
        if(confirm("Permanently delete this entry?")) remove(ref(db, `visits/${currentUid}/${id}`)); 
    };

    const shareBtn = document.getElementById('shareBtn');
    if(shareBtn) {
        shareBtn.onclick = () => {
            const option = document.getElementById('shareOption').value;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            let list = [...allVisits];
            if (option === 'today') list = list.filter(v => v.date === todayStr);
            if (list.length === 0) return alert("No records found.");
            let text = `📋 *SAVIG VISIT REGISTRY*\n\n`;
            list.forEach((v, i) => {
                text += `${i+1}. ${v.name.toUpperCase()}\n📍 ${v.location} | 📅 ${v.date}\n`;
                if(v.timeIn || v.timeOut) text += `🕒 ${v.timeIn} - ${v.timeOut}\n`;
                if(v.travel) text += `🚗 ${v.travel}\n`;
                if(v.reason) text += `💡 ${v.reason}\n--------------------------\n`;
            });
            if (navigator.share) navigator.share({ title: 'Savig Export', text: text });
            else { navigator.clipboard.writeText(text); alert("Registry copied to clipboard!"); }
        };
    }

    // Initial load
    setDateTimeDefaults();
    function toggleForm() {
    const content = document.getElementById('collapsibleForm');
    const icon = document.getElementById('toggleIcon');
    
    if (content.style.maxHeight) {
        // CLOSE
        content.style.maxHeight = null;
        content.style.opacity = "0";
        icon.style.transform = "rotate(0deg)";
    } else {
        // OPEN
        content.style.maxHeight = content.scrollHeight + "px";
        content.style.opacity = "1";
        icon.style.transform = "rotate(45deg)"; // Rotates Plus to an X
    }
}
// Export toggle to window for HTML button
window.toggleForm = () => {
    const content = document.getElementById('collapsibleForm');
    const icon = document.getElementById('toggleIcon');
    if (content.style.maxHeight && content.style.maxHeight !== "0px") {
        content.style.maxHeight = "0px";
        content.style.opacity = "0";
        icon.style.transform = "rotate(0deg)";
    } else {
        content.style.maxHeight = content.scrollHeight + "px";
        content.style.opacity = "1";
        icon.style.transform = "rotate(45deg)";
    }
};
</script>

<script>
    (function() {
        const themeBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');
        const root = document.documentElement;

        const applyTheme = (theme) => {
            root.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.textContent = (theme === 'dark') ? '☀️' : '🌙';
        };

        const savedTheme = localStorage.getItem('theme') || 
                          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);

        themeBtn.addEventListener('click', () => {
            const current = root.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    })();
</script>
